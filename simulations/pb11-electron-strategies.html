<head>
<meta charset="UTF-8">

<title>p-B11プロジェクト別・電子対策比較</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',sans-serif;padding-top:28px}
nav{position:fixed;top:0;left:0;right:0;height:28px;background:rgba(10,10,26,.95);border-bottom:1px solid #333;display:flex;align-items:center;padding:0 12px;z-index:999;font-size:13px}
nav a{color:#88f;text-decoration:none}
h1{text-align:center;padding:16px 10px 4px;font-size:1.2em;color:#ff9}
.sub{text-align:center;color:#aaa;font-size:.82em;margin-bottom:14px}
.container{max-width:940px;margin:0 auto;padding:0 10px 40px}
h2{font-size:1em;color:#8cf;margin:18px 0 8px;border-bottom:1px solid #333;padding-bottom:4px}
canvas{display:block;margin:0 auto;background:#0d0d22;border:1px solid #333;border-radius:6px}

/* Project cards */
.projects{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin:12px 0}
.pcard{background:#111130;border:2px solid #333;border-radius:8px;padding:12px;cursor:pointer;transition:all .2s}
.pcard:hover{border-color:#88f;background:#151540}
.pcard.active{border-color:#ff0;background:#1a1a10}
.pcard .pname{font-weight:bold;font-size:.95em;margin-bottom:4px}
.pcard .pmethod{color:#aaa;font-size:.78em;line-height:1.4}
.pcard .pverdict{margin-top:6px;font-size:.78em;padding:3px 8px;border-radius:4px;display:inline-block}

/* Detail panel */
.detail{background:#111130;border:1px solid #444;border-radius:8px;padding:16px;margin:12px 0;min-height:180px}
.detail h3{color:#ff9;margin-bottom:8px}
.detail .info{font-size:.82em;line-height:1.7;color:#ccc}
.detail .problem{color:#f66;font-size:.82em;margin-top:8px;padding:8px;background:#1a0a0a;border-radius:4px;border-left:3px solid #f44}

.explain{margin:12px 0;padding:10px;background:#0f0f28;border-left:3px solid #f44;border-radius:0 6px 6px 0;font-size:.83em;line-height:1.6}
.explain strong{color:#ff9}
</style>
</head>
<body>
<nav><a href="https://github.com/GoodRelax/pb11-fusion#コンテンツ一覧">📋 一覧に戻る</a></nav>
<h1>p-B11プロジェクト別・電子対策比較</h1>
<p class="sub">各社は「電子の呪い」にどう立ち向かっているか？</p>

<div class="container">

<h2>プロジェクト比較（見込み順）</h2>
<canvas id="progressCanvas" width="900" height="280"></canvas>

<h2>プロジェクト詳細</h2>

<div class="detail" id="detailPanel">

  <div class="info" id="dInfo">上のカードをクリックすると詳細を表示します。</div>
  <div class="problem" id="dProblem" style="display:none"></div>

<h2>電子対策マトリクス（A〜E × プロジェクト）</h2>
<canvas id="matrixCanvas" width="900" height="300"></canvas>

<h2>全員に共通する壁</h2>
<canvas id="wallCanvas" width="900" height="200"></canvas>

<div class="explain">
<strong>結論:</strong> P_ie（イオン-電子緩和）を正面から解決しているプロジェクトは存在しない。
TAEは将来的にαチャネリングに期待、HB11は熱プラズマを避けて回避、LPPは物理的に疑問な主張。
<strong>αチャネリングの実験的検証が、p-B11核融合全体の生死を分ける。</strong>
</div>

</div>

    temp: null, tempNeed: null,

    qDist: '未確定',
    verified: '🔴 思考実験のみ',

    detail: '思考実験プロジェクト\n抜け道②を計算で否定（2026-04-05）\nτ_eq/τ_burn = 0.0038（密度非依存）\n物理的根拠の一つを喪失'

// Project cards
const cardsDiv = document.getElementById('projectCards');
projects.forEach((p, i) => {
  const d = document.createElement('div');
  d.className = 'pcard';
  d.innerHTML = `
    <div class="pname" style="color:${p.color}">${p.name}</div>
    <div class="pmethod">${p.method}</div>
    <div class="pmethod" style="margin-top:4px">${p.verified}</div>
    <div class="pverdict" style="background:${p.color}22;color:${p.color}">${p.gap}</div>
  `;
  d.onclick = () => selectProject(i);
  cardsDiv.appendChild(d);
});

function selectProject(idx) {
  document.querySelectorAll('.pcard').forEach((c,i) => c.classList.toggle('active', i===idx));
  const p = projects[idx];
  document.getElementById('dTitle').textContent = p.name;
  document.getElementById('dTitle').style.color = p.color;
  document.getElementById('dInfo').innerHTML = `
    <b>方式:</b> ${p.method}<br>
    <b>電子対策:</b> ${p.electron}<br>
    <b>Q>1距離:</b> ${p.qDist}<br>
    <b>検証状況:</b> ${p.verified}<br><br>
    <b>詳細:</b><br>${p.detail.replace(/\n/g,'<br>')}
  `;
  document.getElementById('dProblem').style.display = 'block';
  document.getElementById('dProblem').innerHTML = `<b>正直な評価:</b> ${p.problem}`;
}

// Progress chart
const pc = document.getElementById('progressCanvas');
const pctx = pc.getContext('2d');

function drawProgress() {
  pctx.clearRect(0,0,pc.width,pc.height);
  const W=pc.width, H=pc.height;

  pctx.fillStyle='#888';pctx.font='bold 12px sans-serif';pctx.textAlign='center';
  pctx.fillText('p-B11実現への進捗（正直な評価）',W/2,18);

  const barH=32, startY=40, startX=180, maxW=W-220;

  projects.forEach((p,i) => {
    const y = startY + i*(barH+12);
    const bw = (p.progress/100)*maxW;

    // Label
    pctx.fillStyle=p.color;pctx.font='bold 12px sans-serif';pctx.textAlign='right';
    pctx.fillText(p.name, startX-10, y+barH/2+4);

    // Bar bg
    pctx.fillStyle='#1a1a3a';pctx.fillRect(startX,y,maxW,barH);

    // Bar fill
    pctx.fillStyle=p.color+'66';pctx.fillRect(startX,y,bw,barH);
    pctx.strokeStyle=p.color;pctx.lineWidth=1.5;pctx.strokeRect(startX,y,bw,barH);

    // Progress %
    pctx.fillStyle='#fff';pctx.font='bold 11px sans-serif';pctx.textAlign='left';
    pctx.fillText(p.progress+'%', startX+bw+6, y+barH/2+4);

    // Gap annotation
    pctx.fillStyle='#888';pctx.font='10px sans-serif';
    pctx.fillText(p.gap, startX+bw+40, y+barH/2+4);
  });

  // Scale markers
  pctx.fillStyle='#555';pctx.font='9px sans-serif';pctx.textAlign='center';
  for(let pct=0;pct<=100;pct+=25){
    const x = startX + (pct/100)*maxW;
    pctx.fillRect(x,startY-5,1,H-startY-10);
    pctx.fillText(pct+'%',x,H-5);
  }
}

// Matrix chart
const mc = document.getElementById('matrixCanvas');
const mctx = mc.getContext('2d');

function drawMatrix() {
  mctx.clearRect(0,0,mc.width,mc.height);
  const W=mc.width, H=mc.height;

  const approaches = [
    {id:'A',label:'A.空間的にどかす',result:'❌'},
    {id:'B',label:'B.時間的にどかす',result:'❌'},
    {id:'C',label:'C.原子核に吸収',result:'❌'},
    {id:'D',label:'D.エネルギー回収',result:'🟡'},
    {id:'E',label:'E.αチャネリング',result:'🔴'},
  ];

  const cellW=120, cellH=40;
  const startX=170, startY=50;

  // Column headers (projects)
  projects.forEach((p,i) => {
    const x = startX + i*cellW + cellW/2;
    mctx.fillStyle=p.color;mctx.font='bold 10px sans-serif';mctx.textAlign='center';
    // Split name for shorter display
    const short = p.name.split(' ')[0].substring(0,8);
    mctx.fillText(short,x,20);
  });

  // Row headers and cells
  approaches.forEach((a,j) => {
    const y = startY + j*cellH;

    // Row label
    mctx.fillStyle='#aaa';mctx.font='11px sans-serif';mctx.textAlign='right';
    mctx.fillText(a.label, startX-8, y+cellH/2+4);

    // Status background for row
    const rowColor = a.result==='❌'?'#f4411':'🟡'?'#fa011':'#48f11';

    // Cells
    projects.forEach((p,i) => {
      const x = startX + i*cellW;
      const val = p.strategies[a.id];

      // Cell background
      let bg, label;
      if(val >= 0.8){ bg='#4f4'; label='○'; }
      else if(val >= 0.2){ bg='#fa0'; label='△'; }
      else { bg='#444'; label='—'; }

      mctx.fillStyle=bg+'33';
      mctx.fillRect(x+2, y+2, cellW-4, cellH-4);
      mctx.strokeStyle=bg+'66';mctx.lineWidth=1;
      mctx.strokeRect(x+2, y+2, cellW-4, cellH-4);

      mctx.fillStyle=bg;mctx.font='16px sans-serif';mctx.textAlign='center';
      mctx.fillText(label, x+cellW/2, y+cellH/2+6);
    });

    // Result column
    const rx = startX + projects.length*cellW + 10;
    mctx.fillStyle = a.result==='❌'?'#f44':a.result==='🟡'?'#fa0':'#48f';
    mctx.font='bold 11px sans-serif';mctx.textAlign='left';
    mctx.fillText(a.result+' '+(['壊滅','壊滅','壊滅','効率不足','未実証'][j]), rx, y+cellH/2+4);
  });

  // Legend
  mctx.fillStyle='#888';mctx.font='10px sans-serif';mctx.textAlign='left';
  mctx.fillText('○=採用 △=部分的/将来 —=なし',startX, H-10);
}

// Wall chart
const wc = document.getElementById('wallCanvas');
const wctx = wc.getContext('2d');

function drawWall() {
  wctx.clearRect(0,0,wc.width,wc.height);
  const W=wc.width, H=wc.height;

  wctx.fillStyle='#f44';wctx.font='bold 13px sans-serif';wctx.textAlign='center';
  wctx.fillText('全プロジェクト共通の壁: P_ie/P_fus ≈ 74（イオン-電子緩和）',W/2,22);

  const items = [
    {name:'TAE', answer:'将来αチャネリング', status:'🔴 未実証', color:'#4af'},
    {name:'HB11', answer:'熱プラズマ回避', status:'🟡 レーザー効率が新ボトルネック', color:'#f84'},
    {name:'LPP', answer:'GT級量子抑制', status:'❌ 6-7桁不足', color:'#a6f'},
    {name:'LINEA', answer:'ミラー端損失+非熱', status:'🔴 定量データなし', color:'#4c8'},
    {name:'Marvel', answer:'（P_ie以前の段階）', status:'🔴 評価不能', color:'#8cf'},
    {name:'4サイクル', answer:'αチャネリング', status:'🔴 未実証', color:'#ff0'},
  ];

  const barH=24, startY=40, startX=100, maxW=500;
  items.forEach((it,i) => {
    const y = startY+i*(barH+10);
    wctx.fillStyle=it.color;wctx.font='bold 11px sans-serif';wctx.textAlign='right';
    wctx.fillText(it.name,startX-8,y+barH/2+4);

    // Answer bar
    wctx.fillStyle=it.color+'33';wctx.fillRect(startX,y,maxW,barH);
    wctx.strokeStyle=it.color;wctx.lineWidth=1;wctx.strokeRect(startX,y,maxW,barH);

    wctx.fillStyle='#ddd';wctx.font='11px sans-serif';wctx.textAlign='left';
    wctx.fillText(it.answer+' → '+it.status,startX+8,y+barH/2+4);
  });

  // Bottom line
  wctx.fillStyle='#f44';wctx.font='bold 12px sans-serif';wctx.textAlign='center';
  wctx.fillText('αチャネリングの実験的検証 = p-B11核融合全体の生死',W/2,H-10);
}

drawProgress();
drawMatrix();
drawWall();
selectProject(0);
</script>
</body>
</html>
