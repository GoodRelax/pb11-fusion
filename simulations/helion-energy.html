<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helion Energy — FRC 衝突合体 + 磁気圧縮 + 直接発電</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #e0e0e0; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; }
h1 { text-align: center; padding: 14px; font-size: 1.3em; color: #88ccff; }
.subtitle { text-align: center; color: #888; font-size: 0.8em; margin-bottom: 8px; }
.container { max-width: 860px; margin: 0 auto; padding: 0 12px; }
.panel {
  background: #111128; border: 1px solid #333; border-radius: 10px;
  padding: 10px; margin-bottom: 10px;
}
.panel-title { font-size: 0.85em; font-weight: bold; margin-bottom: 6px; color: #88ccff; }
.panel canvas { width: 100%; display: block; border-radius: 6px; }
.controls {
  text-align: center; padding: 8px;
  display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
}
.controls button {
  background: #1a1a3a; color: #88ccff; border: 1px solid #444;
  padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 0.78em;
}
.controls button:hover { background: #2a2a5a; }
.controls button.on { border-color: #ffaa00; color: #ffaa00; }
.legend {
  display: flex; justify-content: center; gap: 14px; padding: 5px; font-size: 0.7em; color: #aaa; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }
.info-box {
  background: #111128; border: 1px solid #333; border-radius: 8px;
  padding: 10px; font-size: 0.75em; line-height: 1.6; margin-top: 8px;
}
.info-box .label { color: #ffaa00; font-weight: bold; }
.meter-row { display: flex; gap: 10px; margin-bottom: 8px; }
.meter {
  flex: 1; background: #111128; border: 1px solid #333; border-radius: 6px; padding: 6px 10px;
  font-size: 0.72em;
}
.meter-label { color: #888; margin-bottom: 2px; }
.meter-bar-bg { background: #1a1a2a; height: 10px; border-radius: 4px; overflow: hidden; }
.meter-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
.meter-val { text-align: right; font-size: 0.85em; margin-top: 2px; }
</style>
</head>
<body>

<h1>Helion Energy — FRC 衝突合体 + 磁気圧縮 + 直接発電</h1>
<div class="subtitle">D-³He パルス核融合 — 2つの FRC を衝突させ、磁気圧縮で核融合、膨張で直接発電</div>

<div class="container">

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ff6644"></div> イオン（D, ³He）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4488ff"></div> 電子</div>
  <div class="legend-item"><div class="legend-dot" style="background:#44ff88"></div> 磁力線（外部）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff44aa"></div> 磁力線（反転・内部）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffcc44"></div> 圧縮コイル</div>
  <div class="legend-item"><div class="legend-dot" style="background:#44ffcc"></div> 回収電流</div>
</div>

<div class="controls">
  <button onclick="setPhase('form')" class="on" id="btnForm">① FRC 形成</button>
  <button onclick="setPhase('collide')" id="btnCollide">② FRC 衝突合体</button>
  <button onclick="setPhase('compress')" id="btnCompress">③ 磁気圧縮 + 直接発電</button>
  <button onclick="setPhase('compare')" id="btnComp">④ vs 4サイクル</button>
  <button onclick="togglePause()" id="btnPause">一時停止</button>
</div>

<div class="panel">
  <div class="panel-title" id="mainTitle">① FRC プラズモイドの形成（両端）</div>
  <canvas id="canvasMain" style="height:380px"></canvas>
</div>

<div class="meter-row">
  <div class="meter">
    <div class="meter-label">プラズマエネルギー</div>
    <div class="meter-bar-bg"><div class="meter-bar" id="meterPlasma" style="width:5%;background:#ff6644"></div></div>
    <div class="meter-val" id="valPlasma" style="color:#ff6644">0.1 MJ</div>
  </div>
  <div class="meter">
    <div class="meter-label">磁気エネルギー</div>
    <div class="meter-bar-bg"><div class="meter-bar" id="meterMag" style="width:5%;background:#44ff88"></div></div>
    <div class="meter-val" id="valMag" style="color:#44ff88">0.1 MJ</div>
  </div>
  <div class="meter">
    <div class="meter-label">回収エネルギー</div>
    <div class="meter-bar-bg"><div class="meter-bar" id="meterRecov" style="width:0%;background:#44ffcc"></div></div>
    <div class="meter-val" id="valRecov" style="color:#44ffcc">0.0 MJ</div>
  </div>
</div>

<div class="info-box" id="infoBox">
  <span class="label">① FRC 形成:</span> 装置の両端でそれぞれ FRC（磁場反転配位）プラズモイドを形成する。外部磁場（緑）に対してプラズマ電流が磁場を反転（ピンク）させ、ラグビーボール型の高β プラズマが生まれる。
</div>

</div>

<script>
const canvas = document.getElementById('canvasMain');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.offsetWidth * 2; H = 760; canvas.width = W; canvas.height = H; }
resize();
window.addEventListener('resize', resize);

let phase = 'form';
let paused = false;
let time = 0;
let plasmaE = 0.1, magE = 0.1, recovE = 0;

// Collision progress (0 = apart, 1 = merged)
let collideProgress = 0;
// Compression progress (0 = no compression, 1 = max compression)
let compressProgress = 0;
let compressDir = 1; // 1=compressing, -1=expanding
let fusionFlash = 0;

const infos = {
  form: '<span class="label">① FRC 形成:</span> 装置の両端でそれぞれ FRC（磁場反転配位）プラズモイドを形成する。外部磁場（緑）に対してプラズマ電流が磁場を反転（ピンク）させ、ラグビーボール型の高β プラズマが生まれる。Helion は TAE と違い、<b>2つの FRC を同時に作る</b>。',
  collide: '<span class="label">② FRC 衝突合体:</span> 2つの FRC を磁気加速で中央に向かって超音速（~300 km/s）で衝突させる。衝突の運動エネルギーが熱エネルギーに変換され、一気にイオンを加熱。NBI のような外部加熱は不要。Trenta で <b>100M°C（~9 keV）</b>を達成。',
  compress: '<span class="label">③ 磁気圧縮 + 直接発電:</span> 合体 FRC を外部コイルで圧縮 → 温度・密度上昇 → D-³He 核融合反応。膨張時に磁束が変化し、ファラデーの法則（EMF = -dΦ/dt）で外部コイルに電流を誘導。<b>投入エネルギー + 核融合エネルギー</b>を回収。効率目標 95%+。',
  compare: '<span class="label">④ Helion vs 4サイクル:</span> 共通点: パルス運転、直接発電、高β。相違点: Helion は D-³He（制動放射が軽いが ³He がない）、4サイクルは p-B11（燃料は無尽蔵だが制動放射が深刻）。Helion の誘導型直接発電回路は 4サイクル案にも応用可能。'
};

function setPhase(p) {
  phase = p;
  ['btnForm','btnCollide','btnCompress','btnComp'].forEach(id => document.getElementById(id).classList.remove('on'));
  const map = { form: 'btnForm', collide: 'btnCollide', compress: 'btnCompress', compare: 'btnComp' };
  document.getElementById(map[p]).classList.add('on');
  document.getElementById('infoBox').innerHTML = infos[p];
  const titles = {
    form: '① FRC プラズモイドの形成（両端）',
    collide: '② FRC 衝突合体 — 超音速衝突で加熱',
    compress: '③ 磁気圧縮 + 核融合 + 直接発電（誘導型）',
    compare: '④ Helion（D-³He）vs 4サイクル案（p-B11）'
  };
  document.getElementById('mainTitle').textContent = titles[p];
  if (p === 'form') {
    collideProgress = 0;
    compressProgress = 0;
    compressDir = 1;
    plasmaE = 0.1; magE = 0.1; recovE = 0;
    fusionFlash = 0;
    resetParticles();
  }
  if (p === 'collide') {
    collideProgress = 0;
    compressProgress = 0;
    compressDir = 1;
    plasmaE = 0.3; magE = 0.5; recovE = 0;
    fusionFlash = 0;
  }
  if (p === 'compress') {
    collideProgress = 1;
    compressProgress = 0;
    compressDir = 1;
    plasmaE = 2.0; magE = 1.0; recovE = 0;
    fusionFlash = 0;
  }
}

function togglePause() {
  paused = !paused;
  const b = document.getElementById('btnPause');
  b.textContent = paused ? '再生' : '一時停止';
  b.classList.toggle('on', paused);
}

// Particles for left and right FRC
const ionsL = [], ionsR = [], elecsL = [], elecsR = [];
const ionsMerged = [], elecsMerged = [];

function makeParticles(arr, count, cx, cy, spread, vScale) {
  arr.length = 0;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * spread;
    arr.push({
      x: cx + Math.cos(angle) * r,
      y: cy + Math.sin(angle) * r * 0.5,
      vx: (Math.random() - 0.5) * vScale,
      vy: (Math.random() - 0.5) * vScale,
      speed: 1
    });
  }
}

function resetParticles() {
  makeParticles(ionsL, 25, 0.2, 0.5, 0.08, 0.003);
  makeParticles(ionsR, 25, 0.8, 0.5, 0.08, 0.003);
  makeParticles(elecsL, 20, 0.2, 0.5, 0.09, 0.005);
  makeParticles(elecsR, 20, 0.8, 0.5, 0.09, 0.005);
  ionsMerged.length = 0;
  elecsMerged.length = 0;
}
resetParticles();

// Energy recovery sparks
const sparks = [];

function drawCoils(cx, cy, rw, rh, strength) {
  // Draw compression coils as rectangles around the FRC
  const coilWidth = 12;
  const coilAlpha = 0.3 + strength * 0.5;
  ctx.fillStyle = `rgba(255,204,68,${coilAlpha})`;

  const nCoils = 6;
  for (let i = 0; i < nCoils; i++) {
    const t = (i / (nCoils - 1)) * 2 - 1; // -1 to 1
    const xOff = t * rw * 1.1;
    // Top coil
    ctx.fillRect(cx + xOff - coilWidth/2, cy - rh * 1.4, coilWidth, 8);
    // Bottom coil
    ctx.fillRect(cx + xOff - coilWidth/2, cy + rh * 1.4 - 8, coilWidth, 8);
  }

  // Coil labels
  if (strength > 0.1) {
    ctx.font = '11px sans-serif';
    ctx.fillStyle = `rgba(255,204,68,${coilAlpha})`;
    ctx.textAlign = 'center';
    ctx.fillText('圧縮コイル', cx, cy - rh * 1.4 - 10);
  }
}

function drawFRCSmall(cx, cy, rw, rh, label) {
  // Separatrix
  ctx.beginPath();
  ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // External field (green)
  ctx.strokeStyle = 'rgba(68,255,136,0.2)';
  ctx.lineWidth = 1;
  const fieldY = [-0.3, -0.15, 0.15, 0.3];
  fieldY.forEach(fy => {
    const y = cy + fy * rh * 3;
    ctx.beginPath();
    ctx.moveTo(cx - rw * 1.5, y);
    ctx.lineTo(cx - rw * 1.0, y);
    ctx.moveTo(cx + rw * 1.0, y);
    ctx.lineTo(cx + rw * 1.5, y);
    ctx.stroke();
    // Arrows
    ctx.beginPath();
    ctx.moveTo(cx + rw * 1.3, y);
    ctx.lineTo(cx + rw * 1.3 - 5, y - 3);
    ctx.moveTo(cx + rw * 1.3, y);
    ctx.lineTo(cx + rw * 1.3 - 5, y + 3);
    ctx.stroke();
  });

  // Internal reversed field (pink)
  ctx.strokeStyle = 'rgba(255,68,170,0.3)';
  [-0.03, 0.03].forEach(fy => {
    const y = cy + fy * H;
    ctx.beginPath();
    ctx.moveTo(cx - rw * 0.6, y);
    ctx.lineTo(cx + rw * 0.6, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - rw * 0.2, y);
    ctx.lineTo(cx - rw * 0.2 + 5, y - 3);
    ctx.moveTo(cx - rw * 0.2, y);
    ctx.lineTo(cx - rw * 0.2 + 5, y + 3);
    ctx.stroke();
  });

  if (label) {
    ctx.font = '12px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.textAlign = 'center';
    ctx.fillText(label, cx, cy - rh - 14);
  }
}

function drawMergedFRC(cx, cy, rw, rh) {
  // Separatrix
  ctx.beginPath();
  ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.font = '11px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.textAlign = 'center';
  ctx.fillText('separatrix', cx, cy - rh - 8);

  // External field (green)
  ctx.strokeStyle = 'rgba(68,255,136,0.25)';
  ctx.lineWidth = 1;
  const fieldY = [-0.35, -0.2, 0.2, 0.35];
  fieldY.forEach(fy => {
    const y = cy + fy * H;
    ctx.beginPath();
    ctx.moveTo(cx - rw * 1.8, y);
    ctx.lineTo(cx - rw * 1.1, y);
    ctx.moveTo(cx + rw * 1.1, y);
    ctx.lineTo(cx + rw * 1.8, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + rw * 1.5, y);
    ctx.lineTo(cx + rw * 1.5 - 6, y - 3);
    ctx.moveTo(cx + rw * 1.5, y);
    ctx.lineTo(cx + rw * 1.5 - 6, y + 3);
    ctx.stroke();
  });

  // Internal reversed field (pink)
  ctx.strokeStyle = 'rgba(255,68,170,0.35)';
  [-0.05, 0.05].forEach(fy => {
    const y = cy + fy * H;
    ctx.beginPath();
    ctx.moveTo(cx - rw * 0.7, y);
    ctx.lineTo(cx + rw * 0.7, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - rw * 0.3, y);
    ctx.lineTo(cx - rw * 0.3 + 6, y - 3);
    ctx.moveTo(cx - rw * 0.3, y);
    ctx.lineTo(cx - rw * 0.3 + 6, y + 3);
    ctx.stroke();
  });

  // Field labels
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#44ff88';
  ctx.textAlign = 'left';
  ctx.fillText('外部磁場 →', cx + rw * 1.2, cy - H * 0.32);
  ctx.fillStyle = '#ff44aa';
  ctx.textAlign = 'center';
  ctx.fillText('← 反転磁場', cx, cy + H * 0.1);
}

function drawEnergySparks(cx, cy, rw, rh) {
  if (compressDir !== -1 || compressProgress < 0.1) return;

  // Energy recovery arrows from plasma to coils
  const alpha = 0.4 + 0.4 * Math.sin(time * 8);
  ctx.strokeStyle = `rgba(68,255,204,${alpha})`;
  ctx.lineWidth = 2;

  const nArrows = 4;
  for (let i = 0; i < nArrows; i++) {
    const t = (i / (nArrows - 1)) * 2 - 1;
    const xOff = t * rw * 0.8;
    // Upward arrow (energy from plasma to coil)
    const fromY = cy - rh * 0.8;
    const toY = cy - rh * 1.5;
    ctx.beginPath();
    ctx.moveTo(cx + xOff, fromY);
    ctx.lineTo(cx + xOff, toY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + xOff, toY);
    ctx.lineTo(cx + xOff - 4, toY + 8);
    ctx.moveTo(cx + xOff, toY);
    ctx.lineTo(cx + xOff + 4, toY + 8);
    ctx.stroke();
    // Downward
    const fromY2 = cy + rh * 0.8;
    const toY2 = cy + rh * 1.5;
    ctx.beginPath();
    ctx.moveTo(cx + xOff, fromY2);
    ctx.lineTo(cx + xOff, toY2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + xOff, toY2);
    ctx.lineTo(cx + xOff - 4, toY2 - 8);
    ctx.moveTo(cx + xOff, toY2);
    ctx.lineTo(cx + xOff + 4, toY2 - 8);
    ctx.stroke();
  }

  // Label
  ctx.font = 'bold 12px sans-serif';
  ctx.fillStyle = `rgba(68,255,204,${alpha})`;
  ctx.textAlign = 'center';
  ctx.fillText('EMF = -dΦ/dt → 電流回収', cx, cy + rh * 1.8);

  // Sparks
  if (Math.random() < 0.15) {
    sparks.push({
      x: cx + (Math.random() - 0.5) * rw * 2,
      y: cy + (Math.random() > 0.5 ? -1 : 1) * rh * 1.3,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 3,
      life: 1
    });
  }
}

function confineParticle(p, cx, cy, maxR, maxRY) {
  const dx = p.x - cx, dy = (p.y - cy) / (maxRY / maxR);
  const r = Math.sqrt(dx * dx + dy * dy);
  if (r > maxR) {
    p.vx -= dx * 0.006;
    p.vy -= dy * 0.006;
  }
  p.vx *= 0.96;
  p.vy *= 0.96;
  p.x += p.vx;
  p.y += p.vy;
}

function updatePhysics() {
  if (phase === 'form') {
    plasmaE = 0.1 + 0.1 * Math.sin(time * 0.5);
    magE = 0.3;
    recovE = 0;
    // Particles stay in their FRCs
    ionsL.forEach(p => { p.vx += (Math.random()-0.5)*0.001; p.vy += (Math.random()-0.5)*0.001; confineParticle(p, 0.2, 0.5, 0.08, 0.04); });
    ionsR.forEach(p => { p.vx += (Math.random()-0.5)*0.001; p.vy += (Math.random()-0.5)*0.001; confineParticle(p, 0.8, 0.5, 0.08, 0.04); });
    elecsL.forEach(p => { p.vx += (Math.random()-0.5)*0.002; p.vy += (Math.random()-0.5)*0.002; confineParticle(p, 0.2, 0.5, 0.09, 0.045); });
    elecsR.forEach(p => { p.vx += (Math.random()-0.5)*0.002; p.vy += (Math.random()-0.5)*0.002; confineParticle(p, 0.8, 0.5, 0.09, 0.045); });
  }
  else if (phase === 'collide') {
    collideProgress = Math.min(1, collideProgress + 0.004);
    const cp = collideProgress;
    const leftCx = 0.2 + cp * 0.3;  // 0.2 -> 0.5
    const rightCx = 0.8 - cp * 0.3; // 0.8 -> 0.5

    plasmaE = 0.3 + cp * 2.5;
    magE = 0.5 + cp * 0.5;
    recovE = 0;

    if (cp < 0.95) {
      // Move particles toward center
      ionsL.forEach(p => { p.vx += (Math.random()-0.5)*0.001; p.vy += (Math.random()-0.5)*0.001; confineParticle(p, leftCx, 0.5, 0.08, 0.04); });
      ionsR.forEach(p => { p.vx += (Math.random()-0.5)*0.001; p.vy += (Math.random()-0.5)*0.001; confineParticle(p, rightCx, 0.5, 0.08, 0.04); });
      elecsL.forEach(p => { p.vx += (Math.random()-0.5)*0.002; p.vy += (Math.random()-0.5)*0.002; confineParticle(p, leftCx, 0.5, 0.09, 0.045); });
      elecsR.forEach(p => { p.vx += (Math.random()-0.5)*0.002; p.vy += (Math.random()-0.5)*0.002; confineParticle(p, rightCx, 0.5, 0.09, 0.045); });
    } else {
      // Merged — transfer to merged arrays
      if (ionsMerged.length === 0) {
        ionsL.forEach(p => ionsMerged.push({...p, speed: 2}));
        ionsR.forEach(p => ionsMerged.push({...p, speed: 2}));
        elecsL.forEach(p => elecsMerged.push({...p}));
        elecsR.forEach(p => elecsMerged.push({...p}));
        fusionFlash = 1;
      }
      ionsMerged.forEach(p => { p.vx += (Math.random()-0.5)*0.002; p.vy += (Math.random()-0.5)*0.002; confineParticle(p, 0.5, 0.5, 0.12, 0.06); p.speed = 2; });
      elecsMerged.forEach(p => { p.vx += (Math.random()-0.5)*0.003; p.vy += (Math.random()-0.5)*0.003; confineParticle(p, 0.5, 0.5, 0.13, 0.065); });
    }
  }
  else if (phase === 'compress') {
    // Oscillate: compress then expand
    if (compressDir === 1) {
      compressProgress = Math.min(1, compressProgress + 0.005);
      if (compressProgress >= 1) {
        compressDir = -1;
        fusionFlash = 1;
      }
    } else {
      compressProgress = Math.max(0, compressProgress - 0.003);
      if (compressProgress <= 0) {
        compressDir = 1;
        recovE = Math.min(5, recovE); // cap
      }
    }

    const cp = compressProgress;
    const shrink = 1 - cp * 0.5; // 1 -> 0.5
    const confineR = 0.12 * shrink;
    const confineRY = 0.06 * shrink;

    plasmaE = 2.0 + cp * 3.0;
    magE = 1.0 + cp * 3.0;
    if (compressDir === -1) {
      recovE = Math.min(5, recovE + 0.02);
    }

    if (ionsMerged.length === 0) {
      // Re-create merged particles if coming from button click
      makeParticles(ionsMerged, 50, 0.5, 0.5, 0.1, 0.003);
      makeParticles(elecsMerged, 40, 0.5, 0.5, 0.11, 0.005);
    }

    ionsMerged.forEach(p => {
      p.vx += (Math.random()-0.5)*0.002 * (1 + cp);
      p.vy += (Math.random()-0.5)*0.002 * (1 + cp);
      confineParticle(p, 0.5, 0.5, confineR, confineRY);
      p.speed = 1 + cp * 3;
    });
    elecsMerged.forEach(p => {
      p.vx += (Math.random()-0.5)*0.003;
      p.vy += (Math.random()-0.5)*0.003;
      confineParticle(p, 0.5, 0.5, confineR * 1.1, confineRY * 1.1);
    });
  }

  // Fusion flash decay
  fusionFlash *= 0.97;

  // Sparks update
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 0.03;
    if (s.life <= 0) sparks.splice(i, 1);
  }
}

function drawParticleArr(arr, color, baseR) {
  arr.forEach(p => {
    const px = p.x * W, py = p.y * H;
    const r = baseR + (p.speed || 1) * 0.6;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#08081a';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;

  if (phase === 'form') {
    // Two separate FRCs
    const rwS = W * 0.1, rhS = H * 0.12;
    drawFRCSmall(W * 0.2, cy, rwS, rhS, 'FRC-L');
    drawFRCSmall(W * 0.8, cy, rwS, rhS, 'FRC-R');

    // Acceleration arrows
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#88ccff';
    ctx.textAlign = 'center';
    ctx.fillText('← 磁気加速待機 →', W * 0.5, cy);

    // Draw particles
    drawParticleArr(elecsL, 'rgba(68,136,255,0.7)', 3);
    drawParticleArr(elecsR, 'rgba(68,136,255,0.7)', 3);
    drawParticleArr(ionsL, 'rgba(255,102,68,0.85)', 3);
    drawParticleArr(ionsR, 'rgba(255,102,68,0.85)', 3);

    // Device outline
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W * 0.05, cy - H * 0.25);
    ctx.lineTo(W * 0.95, cy - H * 0.25);
    ctx.moveTo(W * 0.05, cy + H * 0.25);
    ctx.lineTo(W * 0.95, cy + H * 0.25);
    ctx.stroke();
  }
  else if (phase === 'collide') {
    const cp = collideProgress;
    const leftCx = 0.2 + cp * 0.3;
    const rightCx = 0.8 - cp * 0.3;

    if (cp < 0.95) {
      const rwS = W * 0.1, rhS = H * 0.12;
      drawFRCSmall(leftCx * W, cy, rwS, rhS, 'FRC-L →');
      drawFRCSmall(rightCx * W, cy, rwS, rhS, '← FRC-R');

      // Velocity arrows
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 3;
      // Left arrow
      ctx.beginPath();
      ctx.moveTo(leftCx * W + rwS * 1.2, cy);
      ctx.lineTo(leftCx * W + rwS * 2, cy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(leftCx * W + rwS * 2, cy);
      ctx.lineTo(leftCx * W + rwS * 2 - 8, cy - 5);
      ctx.moveTo(leftCx * W + rwS * 2, cy);
      ctx.lineTo(leftCx * W + rwS * 2 - 8, cy + 5);
      ctx.stroke();
      // Right arrow
      ctx.beginPath();
      ctx.moveTo(rightCx * W - rwS * 1.2, cy);
      ctx.lineTo(rightCx * W - rwS * 2, cy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(rightCx * W - rwS * 2, cy);
      ctx.lineTo(rightCx * W - rwS * 2 + 8, cy - 5);
      ctx.moveTo(rightCx * W - rwS * 2, cy);
      ctx.lineTo(rightCx * W - rwS * 2 + 8, cy + 5);
      ctx.stroke();

      // Speed label
      ctx.font = '12px sans-serif';
      ctx.fillStyle = '#ffaa00';
      ctx.textAlign = 'center';
      ctx.fillText('~300 km/s', W * 0.5, cy - 20);

      drawParticleArr(elecsL, 'rgba(68,136,255,0.7)', 3);
      drawParticleArr(elecsR, 'rgba(68,136,255,0.7)', 3);
      drawParticleArr(ionsL, 'rgba(255,102,68,0.85)', 3);
      drawParticleArr(ionsR, 'rgba(255,102,68,0.85)', 3);
    } else {
      // Merged
      const rw = W * 0.15, rh = H * 0.15;
      drawMergedFRC(cx, cy, rw, rh);

      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = '#ffaa00';
      ctx.textAlign = 'center';
      ctx.fillText('合体完了！ 100M°C 達成', cx, cy - rh - 30);

      drawParticleArr(elecsMerged, 'rgba(68,136,255,0.7)', 3);
      drawParticleArr(ionsMerged, 'rgba(255,102,68,0.85)', 3);
    }

    // Collision flash
    if (fusionFlash > 0.1) {
      ctx.beginPath();
      ctx.arc(cx, cy, fusionFlash * 80, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,200,${fusionFlash * 0.5})`;
      ctx.fill();
    }

    // Device outline
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W * 0.05, cy - H * 0.25);
    ctx.lineTo(W * 0.95, cy - H * 0.25);
    ctx.moveTo(W * 0.05, cy + H * 0.25);
    ctx.lineTo(W * 0.95, cy + H * 0.25);
    ctx.stroke();
  }
  else if (phase === 'compress') {
    const cp = compressProgress;
    const shrink = 1 - cp * 0.5;
    const rw = W * 0.15 * shrink;
    const rh = H * 0.15 * shrink;

    // Coils
    drawCoils(cx, cy, W * 0.18, H * 0.18, cp);

    // Merged FRC (shrinking)
    drawMergedFRC(cx, cy, rw, rh);

    // Fusion glow during max compression
    if (cp > 0.8) {
      const glow = (cp - 0.8) * 5;
      ctx.beginPath();
      ctx.arc(cx, cy, rw * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,200,100,${glow * 0.15})`;
      ctx.fill();

      // Fusion label
      ctx.font = 'bold 12px sans-serif';
      ctx.fillStyle = `rgba(255,200,100,${glow})`;
      ctx.textAlign = 'center';
      ctx.fillText('D + ³He → ⁴He + p + 18.3 MeV', cx, cy + rh + 30);
    }

    // Energy recovery visualization
    drawEnergySparks(cx, cy, rw * 1.5, rh * 1.5);

    // Phase indicator
    ctx.font = '12px sans-serif';
    ctx.fillStyle = compressDir === 1 ? '#ffcc44' : '#44ffcc';
    ctx.textAlign = 'center';
    const phaseText = compressDir === 1 ? '圧縮中... (エネルギー投入)' : '膨張中... (エネルギー回収!)';
    ctx.fillText(phaseText, cx, cy - H * 0.4);

    // Draw particles
    drawParticleArr(elecsMerged, 'rgba(68,136,255,0.7)', 3);
    const heat = Math.min(1, cp);
    ionsMerged.forEach(p => {
      const px = p.x * W, py = p.y * H;
      const r = 3 + (p.speed || 1) * 0.6;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,${Math.floor(102 - heat * 60)},${Math.floor(68 - heat * 30)},0.85)`;
      ctx.fill();
    });

    // Draw sparks
    sparks.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(68,255,204,${s.life})`;
      ctx.fill();
    });

    // Fusion flash
    if (fusionFlash > 0.1) {
      ctx.beginPath();
      ctx.arc(cx, cy, fusionFlash * 60, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,200,${fusionFlash * 0.4})`;
      ctx.fill();
    }
  }
  else if (phase === 'compare') {
    // Side-by-side comparison
    ctx.strokeStyle = '#333';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#88ccff';
    ctx.fillText('Helion（D-³He パルス）', W/4, 30);
    ctx.fillText('4サイクル案（p-B11 パルス）', W*3/4, 30);

    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#aaa';

    // Left side: Helion
    const lx = W / 4;
    let ly = 65;
    const lines_l = [
      '燃料: D-³He',
      'FRC 衝突合体 + 磁気圧縮',
      'パルス運転（~1 Hz）',
      '誘導型直接発電',
      'Z_eff² ≈ 2.8（制動放射 軽い）',
      '',
      '利点: 制動放射が軽い',
      '利点: Trenta で 100M°C 実証',
      '',
      '問題: ³He が地球に ~15 kg/年',
      '問題: D-D 副反応で中性子あり',
    ];
    lines_l.forEach(l => {
      ctx.fillStyle = l.startsWith('利点') ? '#44ff88' : l.startsWith('問題') ? '#ff6666' : '#aaa';
      ctx.fillText(l, lx, ly);
      ly += 22;
    });

    // Right side: 4-cycle
    const rx = W * 3 / 4;
    let ry = 65;
    const lines_r = [
      '燃料: p-B11',
      'Zピンチ圧縮',
      'パルス運転（ns スケール）',
      '直接発電',
      'Z_eff 大（制動放射 深刻）',
      '',
      '利点: 燃料が無尽蔵',
      '利点: 中性子ほぼゼロ',
      '',
      '問題: 実験データなし',
      '問題: 制動放射との戦い',
    ];
    lines_r.forEach(l => {
      ctx.fillStyle = l.startsWith('利点') ? '#44ff88' : l.startsWith('問題') ? '#ff6666' : '#aaa';
      ctx.fillText(l, rx, ry);
      ry += 22;
    });

    // Common ground
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#ffaa00';
    ctx.textAlign = 'center';
    ctx.fillText('共通点: パルス運転 / 直接発電 / 高β / コンパクト', W/2, H - 60);

    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText('Helion: 燃料が致命的 | 4サイクル: 物理が未検証', W/2, H - 35);

    // Mini FRC diagrams
    // Left: Helion FRC collision
    const miniY = H * 0.65;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    // Two small ellipses merging
    const offset = 25 + 15 * Math.sin(time * 2);
    ctx.beginPath();
    ctx.ellipse(lx - offset, miniY, 30, 15, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(lx + offset, miniY, 30, 15, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.font = '10px sans-serif';
    ctx.fillStyle = '#666';
    ctx.fillText('FRC 衝突合体', lx, miniY + 30);

    // Right: Z-pinch
    ctx.beginPath();
    const zw = 20 + 10 * Math.sin(time * 3);
    ctx.ellipse(rx, miniY, zw, 25, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillText('Zピンチ圧縮', rx, miniY + 30);
  }

  // Phase watermark
  if (phase !== 'compare') {
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#555';
    ctx.textAlign = 'right';
    ctx.fillText('Helion Energy — Trenta / Polaris', W - 15, H - 10);
  }

  // Update meters
  document.getElementById('meterPlasma').style.width = Math.min(100, plasmaE / 5 * 100) + '%';
  document.getElementById('valPlasma').textContent = plasmaE.toFixed(1) + ' MJ';
  document.getElementById('meterMag').style.width = Math.min(100, magE / 5 * 100) + '%';
  document.getElementById('valMag').textContent = magE.toFixed(1) + ' MJ';
  document.getElementById('meterRecov').style.width = Math.min(100, recovE / 5 * 100) + '%';
  document.getElementById('valRecov').textContent = recovE.toFixed(1) + ' MJ';
  document.getElementById('meterRecov').style.background = recovE > 0.5 ? '#44ffcc' : '#888';
}

function animate() {
  if (!paused) {
    time += 0.016;
    updatePhysics();
  }
  draw();
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
