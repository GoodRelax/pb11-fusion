<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>D-T vs p-B11 Fusion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

:root {
  --dt-color: #ff3c3c;
  --dt-glow: #ff3c3c88;
  --pb-color: #00ffb2;
  --pb-glow: #00ffb288;
  --bg: #080810;
  --panel: #0d0d1a;
  --border: #ffffff11;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Space Mono', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px 10px;
  overflow-x: hidden;
}

.title-row {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 4px;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  letter-spacing: 0.12em;
  color: #fff;
}

.vs {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1rem, 3vw, 1.6rem);
  color: #ffffff44;
  letter-spacing: 0.1em;
}

.sub {
  font-size: 0.62rem;
  color: #ffffff44;
  letter-spacing: 0.2em;
  margin-bottom: 18px;
  text-align: center;
}

.panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 700px;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 12px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.panel.dt { border-top: 2px solid var(--dt-color); }
.panel.pb { border-top: 2px solid var(--pb-color); }

.panel-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 0.15em;
  margin-bottom: 2px;
}
.dt .panel-title { color: var(--dt-color); text-shadow: 0 0 12px var(--dt-glow); }
.pb .panel-title { color: var(--pb-color); text-shadow: 0 0 12px var(--pb-glow); }

.reaction {
  font-size: 0.62rem;
  color: #ffffff66;
  margin-bottom: 10px;
  letter-spacing: 0.05em;
  text-align: center;
}

canvas {
  border-radius: 2px;
  background: #000018;
}

.stats {
  width: 100%;
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.58rem;
  letter-spacing: 0.05em;
  color: #aaa;
}

.stat-bar-bg {
  flex: 1;
  height: 4px;
  background: #ffffff11;
  margin: 0 8px;
  border-radius: 2px;
  overflow: hidden;
}

.stat-bar {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}

.dt .stat-bar { background: var(--dt-color); box-shadow: 0 0 6px var(--dt-glow); }
.pb .stat-bar { background: var(--pb-color); box-shadow: 0 0 6px var(--pb-glow); }

.stat-val {
  min-width: 48px;
  text-align: right;
  font-size: 0.58rem;
}

.dt .stat-val { color: var(--dt-color); }
.pb .stat-val { color: var(--pb-color); }

/* bottom comparison table */
.compare-table {
  max-width: 700px;
  width: 100%;
  margin-top: 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.ct-row {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  border-bottom: 1px solid var(--border);
}
.ct-row:last-child { border-bottom: none; }

.ct-cell {
  padding: 7px 10px;
  font-size: 0.58rem;
  letter-spacing: 0.05em;
  color: #888;
}

.ct-row.header .ct-cell {
  background: #0d0d1a;
  color: #555;
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.ct-cell.good { color: #00ffb2; }
.ct-cell.bad  { color: #ff3c3c; }
.ct-cell.mid  { color: #ffcc00; }
</style>
</head>
<body>

<div class="title-row">
  <h1 style="color:var(--dt-color)">D-T</h1>
  <div class="vs">VS</div>
  <h1 style="color:var(--pb-color)">p-¹¹B</h1>
</div>
<div class="sub">核融合反応 比較アニメーション</div>

<div class="panels">
  <!-- D-T panel -->
  <div class="panel dt">
    <div class="panel-title">D–T 融合</div>
    <div class="reaction">²H + ³H → ⁴He + n + 17.6 MeV</div>
    <canvas id="cDT" width="290" height="200"></canvas>
    <div class="stats">
      <div class="stat-row">
        <span>温度要件</span>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:28%"></div></div>
        <span class="stat-val">~1億℃</span>
      </div>
      <div class="stat-row">
        <span>中性子比率</span>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:80%"></div></div>
        <span class="stat-val">80%</span>
      </div>
      <div class="stat-row">
        <span>反応効率</span>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:88%"></div></div>
        <span class="stat-val">HIGH</span>
      </div>
    </div>
  </div>

  <!-- p-B11 panel -->
  <div class="panel pb">
    <div class="panel-title">p–¹¹B 融合</div>
    <div class="reaction">p + ¹¹B → 3×⁴He + 8.7 MeV</div>
    <canvas id="cPB" width="290" height="200"></canvas>
    <div class="stats">
      <div class="stat-row">
        <span>温度要件</span>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:90%"></div></div>
        <span class="stat-val">~数十億℃</span>
      </div>
      <div class="stat-row">
        <span>中性子比率</span>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:2%"></div></div>
        <span class="stat-val">≈0%</span>
      </div>
      <div class="stat-row">
        <span>反応効率</span>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:22%"></div></div>
        <span class="stat-val">LOW</span>
      </div>
    </div>
  </div>
</div>

<!-- Comparison table -->
<div class="compare-table">
  <div class="ct-row header">
    <div class="ct-cell">項目</div>
    <div class="ct-cell">D-T</div>
    <div class="ct-cell">p-¹¹B</div>
  </div>
  <div class="ct-row">
    <div class="ct-cell">放射性廃棄物</div>
    <div class="ct-cell bad">多い</div>
    <div class="ct-cell good">ほぼゼロ</div>
  </div>
  <div class="ct-row">
    <div class="ct-cell">燃料入手</div>
    <div class="ct-cell mid">三重水素は希少</div>
    <div class="ct-cell good">豊富・安価</div>
  </div>
  <div class="ct-row">
    <div class="ct-cell">直接発電</div>
    <div class="ct-cell bad">困難</div>
    <div class="ct-cell good">α粒子で可能</div>
  </div>
  <div class="ct-row">
    <div class="ct-cell">実現難易度</div>
    <div class="ct-cell good">比較的低い</div>
    <div class="ct-cell bad">極めて高い</div>
  </div>
  <div class="ct-row">
    <div class="ct-cell">主な挑戦者</div>
    <div class="ct-cell" style="color:#aaa">ITER, NIF</div>
    <div class="ct-cell" style="color:#aaa">TAE Technologies</div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   D-T ANIMATION
═══════════════════════════════════════════ */
(function() {
  const c = document.getElementById('cDT');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  let t = 0;

  // Particles: nucleus objects
  let state = 'approach'; // approach → collide → explode → reset
  let stateT = 0;

  // Deuterium (D): blue, radius 10
  // Tritium (T): red, radius 12
  // He4: orange, radius 11
  // Neutron: gray, radius 6

  const CYCLE = 180;
  let phase = 0;

  function nucleus(x, y, r, color, label) {
    // Glow
    const g = ctx.createRadialGradient(x, y, 0, x, y, r * 2.5);
    g.addColorStop(0, color + 'ff');
    g.addColorStop(0.4, color + '88');
    g.addColorStop(1, color + '00');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r * 2.5, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(8, r * 0.7)}px Space Mono`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
  }

  function neutron(x, y, alpha) {
    ctx.globalAlpha = alpha;
    const g = ctx.createRadialGradient(x, y, 0, x, y, 14);
    g.addColorStop(0, '#aaaaff');
    g.addColorStop(1, '#aaaaff00');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ccccff';
    ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '7px Space Mono';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('n', x, y);
    ctx.globalAlpha = 1;
  }

  // Radiation lines for explosion
  function radiationBurst(cx, cy, progress, color, n) {
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * Math.PI * 2 + progress * 0.5;
      const len = 60 * progress;
      const x1 = cx + Math.cos(angle) * 8;
      const y1 = cy + Math.sin(angle) * 8;
      const x2 = cx + Math.cos(angle) * len;
      const y2 = cy + Math.sin(angle) * len;
      ctx.strokeStyle = color + Math.floor((1 - progress) * 200).toString(16).padStart(2,'0');
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
  }

  // Warning label for neutron
  function drawNeutronWarning(x, y, alpha) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff3c3c';
    ctx.font = 'bold 9px Space Mono';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ 中性子', x, y - 16);
    ctx.fillText('放射化！', x, y - 5);
    ctx.globalAlpha = 1;
  }

  function frame() {
    t++;
    phase = (t % CYCLE) / CYCLE; // 0..1

    ctx.fillStyle = '#000018';
    ctx.fillRect(0, 0, W, H);

    // Subtle grid
    ctx.strokeStyle = '#ffffff08';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    const CX = W / 2, CY = H / 2;

    if (phase < 0.35) {
      // Approach
      const p = phase / 0.35;
      const ease = 1 - Math.pow(1 - p, 2);
      const dx = 100 * (1 - ease);
      nucleus(CX - dx - 12, CY, 11, '#4488ff', 'D');
      nucleus(CX + dx + 12, CY, 13, '#ff4444', 'T');

      // Energy label
      ctx.fillStyle = '#ffffff33';
      ctx.font = '9px Space Mono';
      ctx.textAlign = 'center';
      ctx.fillText('高速衝突 →', CX, CY + 50);

    } else if (phase < 0.42) {
      // Flash / collision
      const p = (phase - 0.35) / 0.07;
      const flashA = Math.sin(p * Math.PI);
      ctx.fillStyle = `rgba(255,200,100,${flashA * 0.6})`;
      ctx.beginPath(); ctx.arc(CX, CY, 50 * flashA, 0, Math.PI * 2); ctx.fill();
      radiationBurst(CX, CY, p, '#ffcc00', 12);
      nucleus(CX, CY, 14 * (1 - p * 0.3), '#ffaa00', '*');

    } else if (phase < 0.72) {
      // Products fly out
      const p = (phase - 0.42) / 0.30;
      const ease = Math.pow(p, 0.5);

      // He4 — three alpha particles
      const angles = [Math.PI * 0.15, Math.PI, Math.PI * 1.7];
      const dist = 80 * ease;
      for (let i = 0; i < 3; i++) {
        // only show He here (neutron separate)
      }
      // He #1 (upper right)
      nucleus(CX + Math.cos(angles[0]) * dist * 0.5, CY + Math.sin(angles[0]) * dist * 0.7, 11, '#ff8800', '⁴He');

      // Neutron (shooting right-ish fast)
      const nx = CX + (90 + 30) * ease;
      const ny = CY - 20 * ease;
      neutron(nx, ny, 1);
      drawNeutronWarning(nx + 10, ny - 20, Math.min(1, p * 3));

      // He #2 (left)
      nucleus(CX - dist * 0.9, CY + dist * 0.1, 11, '#ff8800', '⁴He');

      // Energy label
      ctx.fillStyle = '#ff3c3ccc';
      ctx.font = '8px Space Mono';
      ctx.textAlign = 'center';
      ctx.fillText('+17.6 MeV', CX, CY + 55);

    } else if (phase < 0.85) {
      // Hold: show products spread
      const nx = CX + 110;
      const ny = CY - 20;
      neutron(nx, ny, 1);
      drawNeutronWarning(nx + 10, ny - 20, 1);
      nucleus(CX - 70, CY + 8, 11, '#ff8800', '⁴He');
      nucleus(CX + 30, CY - 50, 11, '#ff8800', '⁴He');
      ctx.fillStyle = '#ff3c3ccc';
      ctx.font = '8px Space Mono';
      ctx.textAlign = 'center';
      ctx.fillText('+17.6 MeV', CX, CY + 55);

      // Reactor wall hit
      ctx.strokeStyle = '#ff3c3c66';
      ctx.lineWidth = 1;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(nx, ny); ctx.lineTo(W - 10, ny + 5); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#ff3c3c88';
      ctx.font = '7px Space Mono';
      ctx.textAlign = 'right';
      ctx.fillText('炉壁に衝突', W - 5, ny + 18);

    } else {
      // Fade out / reset
      const p = (phase - 0.85) / 0.15;
      ctx.globalAlpha = 1 - p;
      neutron(CX + 110, CY - 20, 1 - p);
      nucleus(CX - 70, CY + 8, 11, '#ff8800', '⁴He');
      nucleus(CX + 30, CY - 50, 11, '#ff8800', '⁴He');
      ctx.globalAlpha = 1;
    }

    requestAnimationFrame(frame);
  }
  frame();
})();

/* ═══════════════════════════════════════════
   p-B11 ANIMATION
═══════════════════════════════════════════ */
(function() {
  const c = document.getElementById('cPB');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  let t = 0;
  const CYCLE = 220;

  function nucleus(x, y, r, color, label, fontSize) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r * 2.5);
    g.addColorStop(0, color + 'ff');
    g.addColorStop(0.4, color + '88');
    g.addColorStop(1, color + '00');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r * 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fontSize || Math.max(7, r * 0.65)}px Space Mono`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
  }

  function radiationBurst(cx, cy, progress, color, n) {
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * Math.PI * 2 + t * 0.02;
      const len = 55 * progress;
      ctx.strokeStyle = color + Math.floor((1 - progress) * 180).toString(16).padStart(2,'0');
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(angle) * 8, cy + Math.sin(angle) * 8);
      ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
      ctx.stroke();
    }
  }

  function frame() {
    t++;
    const phase = (t % CYCLE) / CYCLE;
    const CX = W / 2, CY = H / 2;

    ctx.fillStyle = '#000018';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#ffffff08';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    if (phase < 0.30) {
      // Approach: proton from left, B11 from right
      const p = phase / 0.30;
      const ease = 1 - Math.pow(1 - p, 2);
      const dx = 95 * (1 - ease);

      // proton (tiny, light blue)
      nucleus(CX - dx - 8, CY, 7, '#88ffee', 'p');
      // B11 (big, green)
      nucleus(CX + dx + 18, CY, 17, '#00cc88', '¹¹B', 8);

      ctx.fillStyle = '#ffffff22';
      ctx.font = '9px Space Mono';
      ctx.textAlign = 'center';
      ctx.fillText('衝突エネルギー必要', CX, CY + 55);

    } else if (phase < 0.38) {
      // Flash
      const p = (phase - 0.30) / 0.08;
      const flashA = Math.sin(p * Math.PI);
      ctx.fillStyle = `rgba(0,255,180,${flashA * 0.5})`;
      ctx.beginPath(); ctx.arc(CX, CY, 55 * flashA, 0, Math.PI * 2); ctx.fill();
      radiationBurst(CX, CY, p, '#00ffb2', 10);
      nucleus(CX, CY, 20, '#00ffaa', '¹²C*', 8);
      ctx.fillStyle = '#00ffb288';
      ctx.font = '8px Space Mono';
      ctx.textAlign = 'center';
      ctx.fillText('中間状態 ¹²C*', CX, CY + 52);

    } else if (phase < 0.72) {
      // Three alpha particles fly out
      const p = (phase - 0.38) / 0.34;
      const ease = Math.pow(p, 0.55);

      // 3 alphas at 120° apart
      const baseAngle = -Math.PI / 2;
      const dist = 82 * ease;

      for (let i = 0; i < 3; i++) {
        const angle = baseAngle + (i / 3) * Math.PI * 2 + p * 0.3;
        const ax = CX + Math.cos(angle) * dist;
        const ay = CY + Math.sin(angle) * dist;
        nucleus(ax, ay, 11, '#00ffb2', '⁴He', 8);

        // Trail
        ctx.strokeStyle = `rgba(0,255,178,${(1-ease)*0.4})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(ax, ay);
        ctx.stroke();
      }

      // Energy label
      ctx.fillStyle = '#00ffb2cc';
      ctx.font = '8px Space Mono';
      ctx.textAlign = 'center';
      ctx.fillText('+8.7 MeV', CX, CY + 58);

      // No neutron label
      if (p > 0.5) {
        ctx.fillStyle = '#00ffb2';
        ctx.font = 'bold 9px Space Mono';
        ctx.textAlign = 'center';
        ctx.fillText('✓ 中性子なし！', CX, 18);
        ctx.fillStyle = '#00ffb266';
        ctx.font = '8px Space Mono';
        ctx.fillText('炉壁ダメージなし', CX, 30);
      }

    } else if (phase < 0.86) {
      // Hold spread
      const baseAngle = -Math.PI / 2;
      const dist = 82;
      for (let i = 0; i < 3; i++) {
        const angle = baseAngle + (i / 3) * Math.PI * 2 + 0.3;
        nucleus(CX + Math.cos(angle) * dist, CY + Math.sin(angle) * dist, 11, '#00ffb2', '⁴He', 8);
      }
      ctx.fillStyle = '#00ffb2cc';
      ctx.font = '8px Space Mono';
      ctx.textAlign = 'center';
      ctx.fillText('+8.7 MeV', CX, CY + 58);

      // Direct power conversion arrow
      ctx.strokeStyle = '#00ffb244';
      ctx.setLineDash([3,3]);
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(CX + 68, CY - 68); ctx.lineTo(W - 10, 30); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#00ffb2';
      ctx.font = 'bold 9px Space Mono';
      ctx.textAlign = 'center';
      ctx.fillText('✓ 中性子なし！', CX, 18);
      ctx.fillStyle = '#00ffb266';
      ctx.font = '8px Space Mono';
      ctx.fillText('直接発電 可能', CX, 30);

    } else {
      // Fade
      const p = (phase - 0.86) / 0.14;
      ctx.globalAlpha = 1 - p;
      const baseAngle = -Math.PI / 2;
      for (let i = 0; i < 3; i++) {
        const angle = baseAngle + (i / 3) * Math.PI * 2 + 0.3;
        nucleus(CX + Math.cos(angle) * 82, CY + Math.sin(angle) * 82, 11, '#00ffb2', '⁴He', 8);
      }
      ctx.globalAlpha = 1;
    }

    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
