<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>核融合 タイムスケール</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#03030a; font-family:'Share Tech Mono',monospace;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:100vh; padding:16px 8px;
  overflow:hidden;
}
h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.1rem,4vw,1.7rem);
  letter-spacing:0.2em; color:#fff; margin-bottom:2px;
}
.sub { font-size:0.6rem; color:#ffffff33; letter-spacing:0.18em; margin-bottom:10px; }
.tabs { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; justify-content:center; }
.tab {
  background:#0d0d20; border:1px solid #ffffff22; color:#888;
  font-family:'Share Tech Mono',monospace; font-size:0.58rem;
  letter-spacing:0.08em; padding:5px 10px; cursor:pointer; border-radius:2px;
}
.tab:hover { border-color:#ffffff44; color:#bbb; }
.tab.active { background:#1a1a30; border-color:#ffffff66; color:#fff; }
canvas { display:block; border:1px solid #ffffff0d; }
.desc {
  max-width:580px; width:100%; margin-top:10px;
  background:#06060f; border-left:2px solid #888;
  padding:9px 14px; font-size:0.6rem; line-height:1.8;
  color:#999; letter-spacing:0.06em;
}
.desc strong{color:#fff;}
.n{color:#ff6644;} .e{color:#44aaff;} .g{color:#00ffb2;} .w{color:#ffcc00;}
</style>
</head>
<body>
<h1>核融合 タイムスケール</h1>
<div class="sub">距離と時間で何が起きているか</div>

<div class="tabs">
  <button class="tab active" onclick="setScene(0)">① 距離スケール</button>
  <button class="tab" onclick="setScene(1)">② 核融合は電子より速い</button>
  <button class="tab" onclick="setScene(2)">③ 制動放射は積算問題</button>
  <button class="tab" onclick="setScene(3)">④ 4サイクルの根拠</button>
</div>
<canvas id="c" width="580" height="340"></canvas>
<div class="desc" id="desc"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
let scene = 0, t = 0;

const descs = [
  `<strong>距離のスケール：6桁もバラバラ</strong><br>
  <span class="n">核力の届く範囲（核融合が起きる距離）: ~10 fm = 10⁻¹⁴ m</span><br>
  <span class="w">デバイ長（電荷分離の限界）: ~10 nm = 10⁻⁸ m</span><br>
  <span class="e">圧縮後のプラズマサイズ: ~0.5 mm = 5×10⁻⁴ m</span><br>
  核融合が起きる「点」とプラズマ全体は、スケールが全く違う別世界。`,

  `<strong>核融合反応そのものは電子より1000億倍速い</strong><br>
  核融合の時間: ~10⁻²² s　　その間に電子が動く距離: <span class="n">~30 fm（核の大きさと同程度）</span><br>
  <span class="g">→ 核融合反応そのものは電子に邪魔されない。純粋に核力の問題。</span><br>
  電子の影響が出るのは反応後、プラズマ全体のエネルギー収支の話。`,

  `<strong>制動放射は「瞬間」ではなく「積算」の問題</strong><br>
  電子の横断時間: ~2 ps　　燃焼フェーズ: ~1 ns<br>
  <span class="w">→ 1 ns の間に電子はプラズマを500回往復しながらX線を出し続ける</span><br>
  核融合の「点」の問題ではなく、<span class="n">プラズマ「空間」全体で常時エネルギーが逃げる問題。</span>`,

  `<strong>4サイクルの物理的根拠：「燃やし切って逃げる」</strong><br>
  燃焼フェーズ（~ns）≪ 熱平衡時定数 τ_eq（~μs）→ <span class="g">1000倍の差がある</span><br>
  Ti が下がる前に燃焼フェーズを終えてリセットできる。<br>
  <span class="g">→ Te が上がりきる前に次サイクルへ。損失を時間的に切り離す戦略。</span>`,
];

function setScene(n) {
  scene=n; t=0;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===n));
  document.getElementById('desc').innerHTML=descs[n];
}
setScene(0);

/* ── helpers ── */
function glow(x,y,r,color) {
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,color); g.addColorStop(1,color.replace(/[\d.]+\)$/,'0)'));
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
}

/* ══════════════════════════════════
   SCENE 0: Distance scale ruler
══════════════════════════════════ */
function scene0() {
  // Log scale ruler from 10^-15 to 10^-3 m
  const rulerX = 50, rulerY = H/2, rulerW = W-100;
  const logMin = -15, logMax = -3;
  const logRange = logMax - logMin;

  function logToX(logVal) {
    return rulerX + (logVal - logMin) / logRange * rulerW;
  }

  // Ruler base
  ctx.strokeStyle = '#ffffff33';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(rulerX, rulerY); ctx.lineTo(rulerX+rulerW, rulerY); ctx.stroke();

  // Tick marks
  for (let i = logMin; i <= logMax; i++) {
    const x = logToX(i);
    ctx.strokeStyle = '#ffffff44';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, rulerY-8); ctx.lineTo(x, rulerY+8); ctx.stroke();
    ctx.fillStyle = '#ffffff55';
    ctx.font = '7px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText(`10⁻${Math.abs(i)}`, x, rulerY+20);
  }

  ctx.fillStyle='#ffffff33'; ctx.font='8px Share Tech Mono'; ctx.textAlign='center';
  ctx.fillText('距離 (m)', rulerX+rulerW/2, rulerY+34);

  // Markers
  const markers = [
    { log: -14,   label: '核力',     sub: '10⁻¹⁴ m\n= 10 fm',   color: '#ff6644', yOff: -55 },
    { log: -8,    label: 'デバイ長', sub: '10⁻⁸ m\n= 10 nm',    color: '#ffcc00', yOff: -55 },
    { log: -3.3,  label: 'プラズマ', sub: '0.5 mm',              color: '#44aaff', yOff: -55 },
  ];

  markers.forEach(m => {
    const x = logToX(m.log);
    const pulse = 0.7 + 0.3 * Math.sin(t*0.06 + m.log);

    // Vertical line
    ctx.strokeStyle = m.color + '88';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x, rulerY+8); ctx.lineTo(x, rulerY+m.yOff+40); ctx.stroke();
    ctx.setLineDash([]);

    // Glow dot on ruler
    glow(x, rulerY, 12*pulse, m.color+'66');
    ctx.fillStyle = m.color;
    ctx.beginPath(); ctx.arc(x, rulerY, 5, 0, Math.PI*2); ctx.fill();

    // Label box
    ctx.fillStyle = m.color+'22';
    ctx.strokeStyle = m.color+'66';
    ctx.lineWidth = 1;
    const lw = 82, lh = 34;
    const lx = Math.max(rulerX, Math.min(x-lw/2, rulerX+rulerW-lw));
    ctx.fillRect(lx, rulerY+m.yOff, lw, lh);
    ctx.strokeRect(lx, rulerY+m.yOff, lw, lh);

    ctx.fillStyle = m.color;
    ctx.font = 'bold 9px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText(m.label, lx+lw/2, rulerY+m.yOff+13);
    ctx.fillStyle = '#ffffff88';
    ctx.font = '7px Share Tech Mono';
    const lines = m.sub.split('\n');
    lines.forEach((l,i) => ctx.fillText(l, lx+lw/2, rulerY+m.yOff+13+11*(i+1)));
  });

  // Scale gap labels
  ctx.fillStyle = '#ffffff33'; ctx.font = '8px Share Tech Mono'; ctx.textAlign = 'center';
  ctx.fillText('←── 10⁶倍 ──→', logToX(-11), rulerY-80);
  ctx.fillText('←──── 10⁵倍 ────→', logToX(-5.5), rulerY-80);
  ctx.fillText('6桁 + 5桁 = スケールがバラバラ', W/2, 22);
}

/* ══════════════════════════════════
   SCENE 1: Fusion faster than electron
══════════════════════════════════ */
function scene1() {
  const CX = W/2, CY = H/2;

  // Two nuclei approaching and fusing
  const fusionT = (t % 180) / 180; // 0→1 cycle

  // Phase: approach (0→0.45), flash (0.45→0.55), products (0.55→1.0)
  if (fusionT < 0.45) {
    const p = fusionT / 0.45;
    const ease = 1 - Math.pow(1-p, 2);
    const sep = 80*(1-ease);

    // p nucleus (left)
    glow(CX-sep-8, CY, 22, 'rgba(255,100,68,0.4)');
    ctx.fillStyle='#ff6644'; ctx.beginPath(); ctx.arc(CX-sep-8,CY,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='7px Share Tech Mono'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('p',CX-sep-8,CY);

    // B nucleus (right)
    glow(CX+sep+14, CY, 30, 'rgba(0,200,136,0.4)');
    ctx.fillStyle='#00cc88'; ctx.beginPath(); ctx.arc(CX+sep+14,CY,13,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='8px Share Tech Mono';
    ctx.fillText('¹¹B',CX+sep+14,CY);
    ctx.textBaseline='alphabetic';

    // Coulomb repulsion arrows
    if (ease > 0.3) {
      const repA = (ease-0.3)/0.7;
      ctx.strokeStyle=`rgba(255,200,50,${repA*0.6})`; ctx.lineWidth=1.5;
      for (let d of [-1,1]) {
        ctx.beginPath();
        ctx.moveTo(CX+d*30, CY);
        ctx.lineTo(CX+d*55, CY);
        ctx.stroke();
        ctx.fillStyle=`rgba(255,200,50,${repA*0.8})`;
        ctx.beginPath();
        ctx.moveTo(CX+d*55,CY);
        ctx.lineTo(CX+d*55-d*8,CY-4);
        ctx.lineTo(CX+d*55-d*8,CY+4);
        ctx.closePath(); ctx.fill();
      }
    }

    // Electron nearby — large orbit
    const eAngle = t*0.07;
    const ex = CX + Math.cos(eAngle)*110;
    const ey = CY + Math.sin(eAngle)*70;
    glow(ex,ey,10,'rgba(68,170,255,0.4)');
    ctx.fillStyle='#44aaff'; ctx.beginPath(); ctx.arc(ex,ey,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#44aaff'; ctx.font='8px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText('e⁻',ex,ey-9);

    ctx.fillStyle='#ffffff44'; ctx.font='8px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText('電子はプラズマをゆっくり旋回中',CX,CY+110);
    ctx.fillText('クーロン障壁に近づいている',CX,CY-90);

  } else if (fusionT < 0.55) {
    // FLASH — fusion happening
    const fp = (fusionT-0.45)/0.10;
    const burst = Math.sin(fp*Math.PI);
    glow(CX,CY,80*burst,'rgba(255,255,200,0.8)');
    glow(CX,CY,40*burst,'rgba(255,255,255,0.9)');

    ctx.fillStyle=`rgba(255,255,200,${burst})`; ctx.font='bold 11px Share Tech Mono';
    ctx.textAlign='center'; ctx.fillText('核融合！ 10⁻²² s',CX,CY-90);

    // Time label
    ctx.fillStyle=`rgba(255,100,68,${burst})`; ctx.font='9px Share Tech Mono';
    ctx.fillText('この間に電子が動く距離: ~30 fm',CX,CY+80);
    ctx.fillStyle=`rgba(0,255,178,${burst})`; ctx.font='8px Share Tech Mono';
    ctx.fillText('= 核の大きさと同程度 → 電子は無関係',CX,CY+94);

    // Electron still far away
    const ex = CX + 100, ey = CY - 60;
    glow(ex,ey,10,'rgba(68,170,255,0.4)');
    ctx.fillStyle='#44aaff'; ctx.beginPath(); ctx.arc(ex,ey,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(68,170,255,0.6)'; ctx.font='8px Share Tech Mono';
    ctx.fillText('e⁻（まだ全然届かない）',ex+5,ey-10);

  } else {
    // Products
    const pp = (fusionT-0.55)/0.45;
    const dist = pp*110;
    const angles = [-Math.PI*0.15, Math.PI*0.65, Math.PI*1.45];
    angles.forEach((a,i) => {
      const ax = CX+Math.cos(a)*dist, ay = CY+Math.sin(a)*dist;
      glow(ax,ay,18,'rgba(0,255,178,0.3)');
      ctx.fillStyle='#00ffb2'; ctx.beginPath(); ctx.arc(ax,ay,8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; ctx.font='7px Share Tech Mono';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⁴He',ax,ay); ctx.textBaseline='alphabetic';
    });

    // Electron still orbiting far
    const eAngle = t*0.07;
    const ex = CX+Math.cos(eAngle)*110, ey = CY+Math.sin(eAngle)*70;
    glow(ex,ey,10,'rgba(68,170,255,0.3)');
    ctx.fillStyle='#44aaff44'; ctx.beginPath(); ctx.arc(ex,ey,4,0,Math.PI*2); ctx.fill();

    ctx.fillStyle='#00ffb2'; ctx.font='9px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText('核融合完了。電子はまだ旋回中。',CX,CY-90);
    ctx.fillStyle='#ffffff66'; ctx.font='8px Share Tech Mono';
    ctx.fillText('核融合反応は純粋に核力の問題',CX,CY+100);
  }
}

/* ══════════════════════════════════
   SCENE 2: Bremsstrahlung accumulation
══════════════════════════════════ */
let xrays2 = [];
let energyLost = 0;
let energyFusion = 0;
let frameCount = 0;

function scene2() {
  frameCount++;
  const CX = W*0.38, CY = H/2;

  // Plasma box
  const pw = 200, ph = 160;
  ctx.fillStyle='rgba(255,100,68,0.06)';
  ctx.fillRect(CX-pw/2,CY-ph/2,pw,ph);
  ctx.strokeStyle='rgba(255,100,68,0.2)'; ctx.lineWidth=1;
  ctx.strokeRect(CX-pw/2,CY-ph/2,pw,ph);

  // Ions (slow, few)
  const nIons = 6;
  for (let i=0;i<nIons;i++) {
    const a = (i/nIons)*Math.PI*2 + t*0.008;
    const r = 30+i*8;
    const ix = CX+Math.cos(a)*r*0.9;
    const iy = CY+Math.sin(a)*r*0.55;
    glow(ix,iy,16,'rgba(255,100,68,0.3)');
    ctx.fillStyle='#ff6644'; ctx.beginPath(); ctx.arc(ix,iy,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='6px Share Tech Mono'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('p',ix,iy); ctx.textBaseline='alphabetic';
  }

  // Many electrons (fast) — emit xrays
  const nEles = 14;
  for (let i=0;i<nEles;i++) {
    const a = (i/nEles)*Math.PI*2 + t*(0.025+i*0.003);
    const r = 20+(i%4)*18;
    const ex = CX+Math.cos(a)*r*0.88;
    const ey = CY+Math.sin(a)*r*0.55;

    // Emit xray occasionally
    if (t%8===i%8) {
      const xAngle = Math.atan2(ey-CY, ex-CX) + (Math.random()-0.5)*1.2;
      xrays2.push({x:ex,y:ey,angle:xAngle,len:0,age:0,maxLen:55+Math.random()*40});
      energyLost += 0.8;
    }

    glow(ex,ey,8,'rgba(68,170,255,0.3)');
    ctx.fillStyle='#44aaff'; ctx.beginPath(); ctx.arc(ex,ey,3.5,0,Math.PI*2); ctx.fill();
  }

  // Fusion event occasionally
  if (t%90===0) energyFusion += 12;

  // Update/draw xrays
  for (let i=xrays2.length-1;i>=0;i--) {
    const xr=xrays2[i];
    xr.len=Math.min(xr.maxLen,xr.len+5);
    xr.age++;
    if(xr.age>25){xrays2.splice(i,1);continue;}
    const alpha=Math.max(0,1-xr.age/25);
    ctx.strokeStyle=`rgba(255,255,100,${alpha*0.7})`; ctx.lineWidth=1;
    ctx.beginPath();
    const steps=5; ctx.moveTo(xr.x,xr.y);
    for(let s=1;s<=steps;s++){
      const fx=xr.x+Math.cos(xr.angle)*xr.len*s/steps;
      const fy=xr.y+Math.sin(xr.angle)*xr.len*s/steps;
      const side=(s%2===0?1:-1)*4;
      ctx.lineTo(fx+Math.cos(xr.angle+Math.PI/2)*side,fy+Math.sin(xr.angle+Math.PI/2)*side);
    }
    ctx.stroke();
    if(xr.age>15&&xr.len>=xr.maxLen){
      ctx.fillStyle=`rgba(255,255,100,${alpha*0.8})`; ctx.font='7px Share Tech Mono';
      ctx.textAlign='center';
      ctx.fillText('X線',xr.x+Math.cos(xr.angle)*xr.len,xr.y+Math.sin(xr.angle)*xr.len-6);
    }
  }

  // Energy bar (right side)
  const barX=W*0.7, barY=60, barH=220, barW=40;

  // Fusion energy (green)
  const fusionH = Math.min(barH, (energyFusion/500)*barH);
  const lossH = Math.min(barH, (energyLost/500)*barH);

  ctx.fillStyle='#ffffff11'; ctx.fillRect(barX,barY,barW,barH);
  ctx.strokeStyle='#ffffff22'; ctx.lineWidth=1; ctx.strokeRect(barX,barY,barW,barH);

  // Loss (red) fills from bottom
  const fillY = barY+barH-lossH;
  const grad=ctx.createLinearGradient(barX,fillY,barX,barY+barH);
  grad.addColorStop(0,'rgba(255,80,50,0.6)'); grad.addColorStop(1,'rgba(255,50,0,0.8)');
  ctx.fillStyle=grad; ctx.fillRect(barX,fillY,barW,lossH);

  // Fusion gain (green) on top of loss
  ctx.fillStyle='rgba(0,255,178,0.5)';
  ctx.fillRect(barX, Math.max(barY, fillY-fusionH*0.3), barW, Math.min(fusionH*0.3, lossH));

  ctx.fillStyle='#ff6644'; ctx.font='8px Share Tech Mono'; ctx.textAlign='center';
  ctx.fillText('制動放射', barX+barW/2, barY+barH+14);
  ctx.fillText('ロス累積', barX+barW/2, barY+barH+26);

  ctx.fillStyle='#ffffff55'; ctx.font='8px Share Tech Mono';
  ctx.fillText('→ 積み重なる', barX+barW+6, barY+barH-lossH/2+4);

  // Counter
  ctx.fillStyle='#ffcc0099'; ctx.font='8px Share Tech Mono'; ctx.textAlign='left';
  ctx.fillText(`電子の横断: ${Math.floor(t/2)} 回`, CX-pw/2, CY+ph/2+18);
  ctx.fillText('（1 ns で ~500 回）', CX-pw/2, CY+ph/2+30);
}

/* ══════════════════════════════════
   SCENE 3: 4-cycle timescale advantage
══════════════════════════════════ */
function scene3() {
  // Timeline visualization
  // Log scale: 10^-22 to 10^-5
  const tlX=50, tlY=H/2+20, tlW=W-100;
  const logMin=-22, logMax=-5;
  const logRange=logMax-logMin;

  function lx(lv){ return tlX+(lv-logMin)/logRange*tlW; }

  // Timeline base
  ctx.strokeStyle='#ffffff33'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(tlX,tlY); ctx.lineTo(tlX+tlW,tlY); ctx.stroke();

  // Arrow
  ctx.fillStyle='#ffffff33';
  ctx.beginPath(); ctx.moveTo(tlX+tlW,tlY); ctx.lineTo(tlX+tlW-10,tlY-5);
  ctx.lineTo(tlX+tlW-10,tlY+5); ctx.closePath(); ctx.fill();
  ctx.fillText('時間 →',tlX+tlW-30,tlY+16);

  // Events
  const events = [
    { log:-22, label:'核融合反応',  sub:'10⁻²² s',  color:'#ff6644', yOff:-65 },
    { log:-12, label:'電子横断',    sub:'~2 ps',    color:'#44aaff', yOff:30  },
    { log:-9,  label:'燃焼フェーズ', sub:'~1 ns',   color:'#ffcc00', yOff:-65 },
    { log:-6,  label:'τ_eq 熱平衡', sub:'~1 μs',   color:'#00ffb2', yOff:30  },
  ];

  events.forEach(ev=>{
    const x=lx(ev.log);
    const pulse=0.75+0.25*Math.sin(t*0.05+ev.log*0.5);

    ctx.strokeStyle=ev.color+'66'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x,tlY); ctx.lineTo(x,tlY+(ev.yOff<0?ev.yOff+50:ev.yOff-10)); ctx.stroke();
    ctx.setLineDash([]);

    glow(x,tlY,14*pulse,ev.color+'55');
    ctx.fillStyle=ev.color; ctx.beginPath(); ctx.arc(x,tlY,5,0,Math.PI*2); ctx.fill();

    const lw=82, lh=32;
    const lxp=Math.max(tlX,Math.min(x-lw/2,tlX+tlW-lw));
    const lyp=tlY+(ev.yOff<0?ev.yOff:ev.yOff-lh);
    ctx.fillStyle=ev.color+'22'; ctx.strokeStyle=ev.color+'66'; ctx.lineWidth=1;
    ctx.fillRect(lxp,lyp,lw,lh); ctx.strokeRect(lxp,lyp,lw,lh);
    ctx.fillStyle=ev.color; ctx.font='bold 8px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText(ev.label,lxp+lw/2,lyp+12);
    ctx.fillStyle='#ffffff88'; ctx.font='8px Share Tech Mono';
    ctx.fillText(ev.sub,lxp+lw/2,lyp+24);
  });

  // Tick marks
  for(let i=logMin;i<=logMax;i+=2){
    const x=lx(i);
    ctx.strokeStyle='#ffffff33'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,tlY-5); ctx.lineTo(x,tlY+5); ctx.stroke();
    ctx.fillStyle='#ffffff33'; ctx.font='7px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText(`10⁻${Math.abs(i)}`,x,tlY+18);
  }

  // KEY insight bracket: ns << μs
  const x1=lx(-9), x2=lx(-6);
  const bracketY=tlY-90;
  ctx.strokeStyle='#00ffb288'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x1,bracketY+20); ctx.lineTo(x1,bracketY);
  ctx.lineTo(x2,bracketY); ctx.lineTo(x2,bracketY+20); ctx.stroke();

  const pulse=0.6+0.4*Math.sin(t*0.07);
  ctx.fillStyle=`rgba(0,255,178,${pulse})`;
  ctx.font='bold 9px Share Tech Mono'; ctx.textAlign='center';
  ctx.fillText('1000倍の差！', (x1+x2)/2, bracketY-6);
  ctx.font='8px Share Tech Mono';
  ctx.fillText('燃焼 < τ_eq', (x1+x2)/2, bracketY-18);
  ctx.fillText('→ 二温度状態を保ったまま燃やし切れる', (x1+x2)/2, bracketY-30);

  ctx.fillStyle='#ffcc0099'; ctx.font='8px Share Tech Mono'; ctx.textAlign='center';
  ctx.fillText('4サイクル：「電子が温まる前に燃やし切ってリセット」', W/2, H-10);
}

/* ── main loop ── */
function frame(){
  t++;
  ctx.fillStyle='#03030a'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#ffffff06'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  if(scene===0) scene0();
  else if(scene===1) scene1();
  else if(scene===2) scene2();
  else scene3();

  requestAnimationFrame(frame);
}
frame();
</script>
