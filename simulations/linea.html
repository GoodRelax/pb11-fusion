<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINEA — FRC + ミラー磁場 + 非熱的ビーム核融合</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #e0e0e0; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; }
h1 { text-align: center; padding: 14px; font-size: 1.3em; color: #88ccff; }
.subtitle { text-align: center; color: #888; font-size: 0.8em; margin-bottom: 8px; }
.container { max-width: 860px; margin: 0 auto; padding: 0 12px; }
.panel {
  background: #111128; border: 1px solid #333; border-radius: 10px;
  padding: 10px; margin-bottom: 10px;
}
.panel-title { font-size: 0.85em; font-weight: bold; margin-bottom: 6px; color: #88ccff; }
.panel canvas { width: 100%; display: block; border-radius: 6px; }
.controls {
  text-align: center; padding: 8px;
  display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
}
.controls button {
  background: #1a1a3a; color: #88ccff; border: 1px solid #444;
  padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 0.78em;
}
.controls button:hover { background: #2a2a5a; }
.controls button.on { border-color: #ffaa00; color: #ffaa00; }
.legend {
  display: flex; justify-content: center; gap: 14px; padding: 5px; font-size: 0.7em; color: #aaa; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }
.info-box {
  background: #111128; border: 1px solid #333; border-radius: 8px;
  padding: 10px; font-size: 0.75em; line-height: 1.6; margin-top: 8px;
}
.info-box .label { color: #ffaa00; font-weight: bold; }
</style>
</head>
<body>

<h1>LINEA — FRC + ミラー磁場 + 非熱的ビーム核融合</h1>
<div class="subtitle">p-B11 を狙う日本のスタートアップ — 4サイクル案と最も思想が近い</div>

<div class="container">

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ff6644"></div> イオン（p⁺, B⁵⁺）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4488ff"></div> 電子</div>
  <div class="legend-item"><div class="legend-dot" style="background:#44ff88"></div> 外部磁場</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff44aa"></div> FRC 反転磁場</div>
  <div class="legend-item"><div class="legend-dot" style="background:#aa66ff"></div> ミラー磁場</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffcc44"></div> 高エネルギービーム</div>
</div>

<div class="controls">
  <button onclick="setPhase('frc')" class="on" id="btnFrc">① FRC + ミラー</button>
  <button onclick="setPhase('beam')" id="btnBeam">② 非熱的ビーム入射</button>
  <button onclick="setPhase('mirror')" id="btnMirror">③ ミラー端損失と電子制御</button>
  <button onclick="setPhase('compare')" id="btnComp">④ vs 4サイクル</button>
  <button onclick="togglePause()" id="btnPause">一時停止</button>
</div>

<div class="panel">
  <div class="panel-title" id="mainTitle">① FRC + ミラー磁場の構造</div>
  <canvas id="canvasMain" style="height:400px"></canvas>
</div>

<div class="info-box" id="infoBox">
  <span class="label">① FRC + ミラー:</span> FRC（ピンク）がプラズマを高β(≈1)で閉じ込め、両端をミラー磁場（紫）で塞ぐ。ミラーの強さで端損失を調整できる — これが LINEA の独自性。CSO 浅井教授は FRC 合体生成の国内唯一の実績者。CTO 坂本教授はタンデムミラーの専門家。
</div>

</div>

<script>
const canvas = document.getElementById('canvasMain');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.offsetWidth * 2; H = 800; canvas.width = W; canvas.height = H; }
resize();
window.addEventListener('resize', resize);

let phase = 'frc';
let paused = false;
let time = 0;

const infos = {
  frc: '<span class="label">① FRC + ミラー:</span> FRC（ピンク）がプラズマを高β(≈1)で閉じ込め、両端をミラー磁場（紫）で塞ぐ。ミラーの強さで端損失を調整できる — これが LINEA の独自性。CSO 浅井教授は FRC 合体生成の国内唯一の実績者。CTO 坂本教授はタンデムミラーの専門家。',
  beam: '<span class="label">② 非熱的ビーム入射:</span> 高エネルギービーム（黄色）でイオンをガモフピーク付近のエネルギーに集中させる。マクスウェル分布ではなく「非熱的」分布を作る。同じ平均エネルギーでも核融合率が 2〜5 倍高い。これは4サイクル案の「抜け道①」と同じ発想。',
  mirror: '<span class="label">③ ミラー端損失と電子制御:</span> ミラー磁場の強さを調整すると端損失を制御できる。電子（速い、ラーモア半径小）は端から逃げやすく、イオン（遅い、ラーモア半径大）は逃げにくい。これは4サイクル案の「Phase 2b 電子排出」と直結する概念。ただしアンビポーラ電位の壁は同じ。',
  compare: '<span class="label">④ vs 4サイクル:</span> LINEA と4サイクル案は「p-B11 + 非熱的 + ミラー端損失」が完全一致。違いは閉じ込め（FRC vs Zピンチ）と運転モード（定常 vs パルス）。LINEAは定常でτ_eqと戦う。4サイクルはパルスで逃げる。どちらも未実証。'
};

function setPhase(p) {
  phase = p;
  ['btnFrc','btnBeam','btnMirror','btnComp'].forEach(id => document.getElementById(id).classList.remove('on'));
  const map = { frc:'btnFrc', beam:'btnBeam', mirror:'btnMirror', compare:'btnComp' };
  document.getElementById(map[p]).classList.add('on');
  document.getElementById('infoBox').innerHTML = infos[p];
  const titles = {
    frc: '① FRC + ミラー磁場の構造',
    beam: '② 非熱的ビーム入射 — ガモフピークに集中',
    mirror: '③ ミラー端損失 — 電子だけ端から逃がす',
    compare: '④ LINEA（定常）vs 4サイクル案（パルス）'
  };
  document.getElementById('mainTitle').textContent = titles[p];
}
function togglePause() {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '再生' : '一時停止';
  document.getElementById('btnPause').classList.toggle('on', paused);
}

// Particles
const ions = [], elecs = [];
for (let i = 0; i < 45; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.18;
  ions.push({ x: 0.5 + Math.cos(a)*r, y: 0.5 + Math.sin(a)*r*0.45,
    vx: (Math.random()-0.5)*0.003, vy: (Math.random()-0.5)*0.003 });
}
for (let i = 0; i < 35; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.2;
  elecs.push({ x: 0.5 + Math.cos(a)*r, y: 0.5 + Math.sin(a)*r*0.45,
    vx: (Math.random()-0.5)*0.007, vy: (Math.random()-0.5)*0.007,
    escaping: false, escapeX: 0 });
}

const beamParticles = [];
const escapingElecs = [];

function drawMirrorField(cx, cy, rw, rh) {
  // Mirror coils at both ends (purple)
  const coilWidth = rw * 0.15;
  const mirrorStrength = (phase === 'mirror') ? 0.5 + 0.3 * Math.sin(time * 2) : 0.8;

  // Left mirror coil
  ctx.strokeStyle = `rgba(170,102,255,${mirrorStrength})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(cx - rw * 0.95, cy, coilWidth * 0.3, rh * 1.2, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Right mirror coil
  ctx.beginPath();
  ctx.ellipse(cx + rw * 0.95, cy, coilWidth * 0.3, rh * 1.2, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Mirror field lines (converging at ends)
  ctx.strokeStyle = `rgba(170,102,255,${mirrorStrength * 0.3})`;
  ctx.lineWidth = 1;
  const nLines = 5;
  for (let i = 0; i < nLines; i++) {
    const frac = ((i + 0.5) / nLines) * 2 - 1;
    const y0 = cy + frac * rh * 0.8;
    // Converge toward mirror points
    const yMirrorL = cy + frac * rh * 0.3;
    const yMirrorR = cy + frac * rh * 0.3;

    ctx.beginPath();
    ctx.moveTo(cx - rw * 1.5, y0);
    ctx.quadraticCurveTo(cx - rw * 0.95, yMirrorL, cx - rw * 0.5, y0);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx + rw * 1.5, y0);
    ctx.quadraticCurveTo(cx + rw * 0.95, yMirrorR, cx + rw * 0.5, y0);
    ctx.stroke();
  }

  // Labels
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#aa66ff';
  ctx.textAlign = 'center';
  ctx.fillText('ミラーコイル', cx - rw * 0.95, cy - rh * 1.3);
  ctx.fillText('ミラーコイル', cx + rw * 0.95, cy - rh * 1.3);

  if (phase === 'mirror') {
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#aa66ff';
    ctx.fillText('磁場強度を調整 → 端損失を制御', cx, cy + rh * 1.4);
  }
}

function drawFRC(cx, cy, rw, rh) {
  // Separatrix
  ctx.beginPath();
  ctx.ellipse(cx, cy, rw * 0.7, rh * 0.8, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.font = '10px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.textAlign = 'center';
  ctx.fillText('separatrix', cx, cy - rh * 0.85);

  // External field (green →)
  ctx.strokeStyle = 'rgba(68,255,136,0.15)';
  ctx.lineWidth = 1;
  const fieldY = [-0.3, -0.2, 0.2, 0.3];
  fieldY.forEach(fy => {
    const y = cy + fy * H;
    ctx.beginPath();
    ctx.moveTo(cx - rw * 1.4, y);
    ctx.lineTo(cx - rw * 0.8, y);
    ctx.moveTo(cx + rw * 0.8, y);
    ctx.lineTo(cx + rw * 1.4, y);
    ctx.stroke();
  });

  // Internal reversed field (pink ←)
  ctx.strokeStyle = 'rgba(255,68,170,0.3)';
  const intY = [-0.04, 0.04];
  intY.forEach(fy => {
    const y = cy + fy * H;
    ctx.beginPath();
    ctx.moveTo(cx - rw * 0.5, y);
    ctx.lineTo(cx + rw * 0.5, y);
    ctx.stroke();
    // Reversed arrows
    ctx.beginPath();
    ctx.moveTo(cx - rw * 0.1, y);
    ctx.lineTo(cx - rw * 0.1 + 6, y - 3);
    ctx.moveTo(cx - rw * 0.1, y);
    ctx.lineTo(cx - rw * 0.1 + 6, y + 3);
    ctx.stroke();
  });

  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#ff44aa';
  ctx.textAlign = 'center';
  ctx.fillText('← FRC 反転磁場', cx, cy + H * 0.08);
}

function drawBeams(cx, cy, rw) {
  if (phase !== 'beam') return;
  const alpha = 0.5 + 0.3 * Math.sin(time * 4);

  // Beams from both ends (through mirror gaps)
  ctx.strokeStyle = `rgba(255,204,68,${alpha})`;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(cx - rw * 1.8, cy);
  ctx.lineTo(cx - rw * 0.2, cy);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + rw * 1.8, cy);
  ctx.lineTo(cx + rw * 0.2, cy);
  ctx.stroke();

  ctx.font = 'bold 12px sans-serif';
  ctx.fillStyle = '#ffcc44';
  ctx.textAlign = 'center';
  ctx.fillText('高エネルギービーム →', cx - rw * 1.3, cy - 18);
  ctx.fillText('← 高エネルギービーム', cx + rw * 1.3, cy - 18);

  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#ffcc44aa';
  ctx.fillText('ガモフピーク付近にイオンを集中', cx, cy + H * 0.25);
  ctx.fillText('= 非マクスウェル分布（非熱的）', cx, cy + H * 0.28);

  // Beam particles
  if (Math.random() < 0.06) {
    beamParticles.push({
      x: Math.random() > 0.5 ? 0.05 : 0.95,
      y: 0.5 + (Math.random()-0.5)*0.02,
      vx: 0, life: 1
    });
    const last = beamParticles[beamParticles.length-1];
    last.vx = last.x < 0.5 ? 0.015 : -0.015;
  }
}

function drawEscapingElectrons(cx, cy, rw, rh) {
  if (phase !== 'mirror') return;

  // Arrows showing electron escape at ends
  const alpha = 0.5 + 0.3 * Math.sin(time * 3);
  ctx.strokeStyle = `rgba(68,136,255,${alpha})`;
  ctx.fillStyle = `rgba(68,136,255,${alpha})`;
  ctx.lineWidth = 2;

  // Left escape arrows
  [-10, 0, 10].forEach(oy => {
    ctx.beginPath();
    ctx.moveTo(cx - rw * 0.6, cy + oy);
    ctx.lineTo(cx - rw * 1.3, cy + oy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - rw * 1.3, cy + oy);
    ctx.lineTo(cx - rw * 1.3 + 7, cy + oy - 4);
    ctx.lineTo(cx - rw * 1.3 + 7, cy + oy + 4);
    ctx.fill();
  });

  // Right escape arrows
  [-10, 0, 10].forEach(oy => {
    ctx.beginPath();
    ctx.moveTo(cx + rw * 0.6, cy + oy);
    ctx.lineTo(cx + rw * 1.3, cy + oy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + rw * 1.3, cy + oy);
    ctx.lineTo(cx + rw * 1.3 - 7, cy + oy - 4);
    ctx.lineTo(cx + rw * 1.3 - 7, cy + oy + 4);
    ctx.fill();
  });

  ctx.font = '12px sans-serif';
  ctx.fillStyle = `rgba(68,136,255,${alpha})`;
  ctx.textAlign = 'center';
  ctx.fillText('e⁻ 流出（速い ~1ns）', cx - rw * 1.0, cy - 30);
  ctx.fillText('e⁻ 流出（速い ~1ns）', cx + rw * 1.0, cy - 30);

  ctx.fillStyle = `rgba(255,102,68,${alpha * 0.5})`;
  ctx.fillText('イオンは残留（遅い ~100ns）', cx, cy + rh + 20);

  // Escape some electrons
  elecs.forEach(e => {
    if (!e.escaping && Math.random() < 0.003) {
      e.escaping = true;
      e.escapeX = e.x > 0.5 ? 1 : -1;
    }
  });
}

function updateParticles() {
  ions.forEach(p => {
    p.vx += (Math.random()-0.5) * 0.001;
    p.vy += (Math.random()-0.5) * 0.001;
    const dx = p.x - 0.5, dy = (p.y - 0.5) * 2.2;
    const r = Math.sqrt(dx*dx + dy*dy);
    if (r > 0.16) { p.vx -= dx * 0.004; p.vy -= dy * 0.004; }
    p.vx *= 0.96; p.vy *= 0.96;
    p.x += p.vx; p.y += p.vy;
  });

  elecs.forEach(e => {
    if (e.escaping) {
      e.x += e.escapeX * 0.008;
      if (e.x < 0.02 || e.x > 0.98) {
        e.escaping = false;
        e.x = 0.5 + (Math.random()-0.5)*0.3;
        e.y = 0.5 + (Math.random()-0.5)*0.15;
      }
      return;
    }
    e.vx += (Math.random()-0.5) * 0.002;
    e.vy += (Math.random()-0.5) * 0.002;
    const dx = e.x - 0.5, dy = (e.y - 0.5) * 2.2;
    const r = Math.sqrt(dx*dx + dy*dy);
    if (r > 0.18) { e.vx -= dx * 0.006; e.vy -= dy * 0.006; }
    e.vx *= 0.94; e.vy *= 0.94;
    e.x += e.vx; e.y += e.vy;
  });

  // Beam particles
  for (let i = beamParticles.length - 1; i >= 0; i--) {
    const p = beamParticles[i];
    p.x += p.vx;
    p.life -= 0.01;
    const dx = p.x - 0.5;
    if (Math.abs(dx) < 0.1 && Math.random() < 0.1) {
      beamParticles.splice(i, 1);
      continue;
    }
    if (p.life <= 0 || p.x < 0 || p.x > 1) beamParticles.splice(i, 1);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#08081a';
  ctx.fillRect(0, 0, W, H);

  const cx = W/2, cy = H/2;
  const rw = W * 0.28, rh = H * 0.22;

  if (phase === 'compare') {
    // Split view
    ctx.strokeStyle = '#333';
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#88ccff';
    ctx.fillText('LINEA（定常）', W/4, 28);
    ctx.fillText('4サイクル案（パルス）', W*3/4, 28);

    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#aaa';
    const leftLines = [
      'FRC + ミラー磁場',
      '非熱的ビーム → 非マクスウェル',
      'ミラー端損失 → 電子制御',
      '定常運転 → τ_eq と永遠の戦い',
      '',
      'p-B11 燃料',
      'CSO: FRC合体実績',
      'CTO: タンデムミラー実績',
    ];
    const rightLines = [
      'Zピンチ + 電子ビーム',
      '非マクスウェル分布',
      'Phase 2b 電子排出',
      'パルス → τ_burn < τ_eq で逃げる',
      '',
      'p-B11 燃料',
      '実験データ: なし',
      '資金: 0円',
    ];
    leftLines.forEach((l, i) => {
      ctx.fillStyle = i < 4 ? '#88ccff' : '#888';
      ctx.textAlign = 'center';
      ctx.fillText(l, W/4, 60 + i * 22);
    });
    rightLines.forEach((l, i) => {
      ctx.fillStyle = i < 4 ? '#ffaa00' : '#888';
      ctx.textAlign = 'center';
      ctx.fillText(l, W*3/4, 60 + i * 22);
    });

    // Matching lines
    ctx.strokeStyle = 'rgba(68,255,136,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    [1,2,5].forEach(i => {
      const y = 60 + i * 22 - 6;
      ctx.beginPath();
      ctx.moveTo(W/4 + 120, y);
      ctx.lineTo(W*3/4 - 120, y);
      ctx.stroke();
    });
    ctx.setLineDash([]);

    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#44ff88';
    ctx.fillText('一致: 非熱的 + ミラー + p-B11', cx, H * 0.55);
    ctx.fillStyle = '#ff8844';
    ctx.fillText('相違: 定常 vs パルス / FRC vs Zピンチ', cx, H * 0.6);

    return;
  }

  // Normal views
  drawMirrorField(cx, cy, rw, rh);
  drawFRC(cx, cy, rw, rh);
  drawBeams(cx, cy, rw);
  drawEscapingElectrons(cx, cy, rw, rh);

  // Beam particles
  beamParticles.forEach(p => {
    ctx.fillStyle = `rgba(255,204,68,${p.life})`;
    ctx.fillRect(p.x * W - 3, p.y * H - 3, 6, 6);
  });

  // Electrons
  elecs.forEach(e => {
    const px = e.x * W, py = e.y * H;
    const alpha = e.escaping ? 0.5 : 0.7;
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(68,136,255,${alpha})`;
    ctx.fill();
  });

  // Ions
  ions.forEach(p => {
    const px = p.x * W, py = p.y * H;
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,102,68,0.85)';
    ctx.fill();
  });

  // Title label
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#555';
  ctx.textAlign = 'right';
  ctx.fillText('LINEA Innovations（日本）', W - 15, H - 10);
}

function animate() {
  if (!paused) { time += 0.016; updateParticles(); }
  draw();
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
