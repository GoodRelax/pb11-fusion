<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAE Technologies — FRC + NBI 段階加熱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #e0e0e0; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; }
h1 { text-align: center; padding: 14px; font-size: 1.3em; color: #88ccff; }
.subtitle { text-align: center; color: #888; font-size: 0.8em; margin-bottom: 8px; }
.container { max-width: 860px; margin: 0 auto; padding: 0 12px; }
.panel {
  background: #111128; border: 1px solid #333; border-radius: 10px;
  padding: 10px; margin-bottom: 10px;
}
.panel-title { font-size: 0.85em; font-weight: bold; margin-bottom: 6px; color: #88ccff; }
.panel canvas { width: 100%; display: block; border-radius: 6px; }
.controls {
  text-align: center; padding: 8px;
  display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
}
.controls button {
  background: #1a1a3a; color: #88ccff; border: 1px solid #444;
  padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 0.78em;
}
.controls button:hover { background: #2a2a5a; }
.controls button.on { border-color: #ffaa00; color: #ffaa00; }
.legend {
  display: flex; justify-content: center; gap: 14px; padding: 5px; font-size: 0.7em; color: #aaa; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }
.info-box {
  background: #111128; border: 1px solid #333; border-radius: 8px;
  padding: 10px; font-size: 0.75em; line-height: 1.6; margin-top: 8px;
}
.info-box .label { color: #ffaa00; font-weight: bold; }
.meter-row { display: flex; gap: 10px; margin-bottom: 8px; }
.meter {
  flex: 1; background: #111128; border: 1px solid #333; border-radius: 6px; padding: 6px 10px;
  font-size: 0.72em;
}
.meter-label { color: #888; margin-bottom: 2px; }
.meter-bar-bg { background: #1a1a2a; height: 10px; border-radius: 4px; overflow: hidden; }
.meter-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
.meter-val { text-align: right; font-size: 0.85em; margin-top: 2px; }
</style>
</head>
<body>

<h1>TAE Technologies — FRC + NBI 段階加熱</h1>
<div class="subtitle">p-B11 を目指す最大の挑戦者 — NBI でイオンだけを加熱して Ti > Te を実現</div>

<div class="container">

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ff6644"></div> イオン（高速）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4488ff"></div> 電子</div>
  <div class="legend-item"><div class="legend-dot" style="background:#44ff88"></div> 磁力線（外部）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff44aa"></div> 磁力線（反転・内部）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffcc44"></div> NBI ビーム</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffee44"></div> X線（制動放射）</div>
</div>

<div class="controls">
  <button onclick="setPhase('frc')" class="on" id="btnFrc">① FRC 形成</button>
  <button onclick="setPhase('nbi')" id="btnNbi">② NBI 入射</button>
  <button onclick="setPhase('tite')" id="btnTite">③ Ti/Te 分離</button>
  <button onclick="setPhase('compare')" id="btnComp">④ vs 4サイクル</button>
  <button onclick="togglePause()" id="btnPause">一時停止</button>
</div>

<div class="panel">
  <div class="panel-title" id="mainTitle">① FRC（磁場反転配位）の形成</div>
  <canvas id="canvasMain" style="height:380px"></canvas>
</div>

<div class="meter-row">
  <div class="meter">
    <div class="meter-label">イオン温度 Ti</div>
    <div class="meter-bar-bg"><div class="meter-bar" id="meterTi" style="width:5%;background:#ff6644"></div></div>
    <div class="meter-val" id="valTi" style="color:#ff6644">0.1 keV</div>
  </div>
  <div class="meter">
    <div class="meter-label">電子温度 Te</div>
    <div class="meter-bar-bg"><div class="meter-bar" id="meterTe" style="width:5%;background:#4488ff"></div></div>
    <div class="meter-val" id="valTe" style="color:#4488ff">0.1 keV</div>
  </div>
  <div class="meter">
    <div class="meter-label">Ti/Te 比</div>
    <div class="meter-bar-bg"><div class="meter-bar" id="meterRatio" style="width:25%;background:#44ff88"></div></div>
    <div class="meter-val" id="valRatio" style="color:#44ff88">1.0</div>
  </div>
</div>

<div class="info-box" id="infoBox">
  <span class="label">FRC 形成:</span> 外部磁場（緑→）に対してプラズマ内部で電流が流れ、磁場を反転（ピンク←）させる。分離面（separatrix）の内側では磁場がほぼゼロ → β ≈ 1 の高効率プラズマ。
</div>

</div>

<script>
const canvas = document.getElementById('canvasMain');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.offsetWidth * 2; H = 760; canvas.width = W; canvas.height = H; }
resize();
window.addEventListener('resize', resize);

let phase = 'frc';
let paused = false;
let time = 0;
let ti = 0.1, te = 0.1;

const infos = {
  frc: '<span class="label">① FRC 形成:</span> 外部磁場（緑→）に対してプラズマ電流が磁場を反転（ピンク←）させる。分離面（separatrix）の内側では β ≈ 1。ラグビーボール型のコンパクトなプラズマが生まれる。トカマクと違い、大きなコイルが不要。',
  nbi: '<span class="label">② NBI 入射:</span> 中性粒子ビーム（黄色の矢印）を両端から入射。中性粒子は磁場を無視してプラズマ中心まで到達 → 電離されて高速イオンに。<b>イオンだけにエネルギーが入る</b>ので Ti が上がり、Te はあまり上がらない。',
  tite: '<span class="label">③ Ti/Te 分離:</span> NBI の連続入射により Ti が Te を上回る。C-2W "Norman" では <b>Ti ≈ 2 keV, Te ≈ 0.5 keV（Ti/Te ≈ 4）</b>を達成。ただし p-B11 には Ti/Te ≈ 300 が必要で、まだ 75 倍足りない。定常運転では τ_eq の壁がある。',
  compare: '<span class="label">④ TAE vs 4サイクル:</span> TAE は定常的に Ti/Te を維持する。4サイクル案はパルスで τ_eq より速く燃やして逃げる。TAE の Ti/Te=4 は「実験で出た」実績。4サイクル案の Ti/Te は「計算上の可能性」。実験データの有無が決定的な差。'
};

function setPhase(p) {
  phase = p;
  ['btnFrc','btnNbi','btnTite','btnComp'].forEach(id => document.getElementById(id).classList.remove('on'));
  const map = { frc: 'btnFrc', nbi: 'btnNbi', tite: 'btnTite', compare: 'btnComp' };
  document.getElementById(map[p]).classList.add('on');
  document.getElementById('infoBox').innerHTML = infos[p];
  const titles = {
    frc: '① FRC（磁場反転配位）の形成',
    nbi: '② NBI（中性粒子ビーム）入射 → イオン選択加熱',
    tite: '③ Ti/Te 分離の実現（C-2W 実績: Ti/Te ≈ 4）',
    compare: '④ TAE（定常）vs 4サイクル案（パルス）'
  };
  document.getElementById('mainTitle').textContent = titles[p];
  if (p === 'frc') { ti = 0.1; te = 0.1; }
}

function togglePause() {
  paused = !paused;
  const b = document.getElementById('btnPause');
  b.textContent = paused ? '再生' : '一時停止';
  b.classList.toggle('on', paused);
}

// Particles
const ions = [], elecs = [];
for (let i = 0; i < 50; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.25;
  ions.push({ x: 0.5 + Math.cos(angle) * r, y: 0.5 + Math.sin(angle) * r * 0.5,
    vx: (Math.random()-0.5)*0.003, vy: (Math.random()-0.5)*0.003, speed: 1 });
}
for (let i = 0; i < 40; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.25;
  elecs.push({ x: 0.5 + Math.cos(angle) * r, y: 0.5 + Math.sin(angle) * r * 0.5,
    vx: (Math.random()-0.5)*0.006, vy: (Math.random()-0.5)*0.006 });
}

// NBI beams
const nbiParticles = [];

// X-ray photons
const xrays = [];

function drawFRC(cx, cy, rw, rh) {
  // Separatrix (rugby ball shape)
  ctx.beginPath();
  ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Label
  ctx.font = '11px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.textAlign = 'center';
  ctx.fillText('separatrix', cx, cy - rh - 8);

  // External magnetic field (green, rightward)
  ctx.strokeStyle = 'rgba(68,255,136,0.2)';
  ctx.lineWidth = 1;
  const fieldY = [-0.35, -0.25, -0.15, 0.15, 0.25, 0.35];
  fieldY.forEach(fy => {
    const y = cy + fy * H;
    ctx.beginPath();
    ctx.moveTo(cx - rw * 1.8, y);
    ctx.lineTo(cx - rw * 1.1, y);
    ctx.moveTo(cx + rw * 1.1, y);
    ctx.lineTo(cx + rw * 1.8, y);
    ctx.stroke();
    // Arrows
    ctx.beginPath();
    ctx.moveTo(cx - rw * 1.3, y);
    ctx.lineTo(cx - rw * 1.3 - 6, y - 3);
    ctx.moveTo(cx - rw * 1.3, y);
    ctx.lineTo(cx - rw * 1.3 - 6, y + 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + rw * 1.5, y);
    ctx.lineTo(cx + rw * 1.5 - 6, y - 3);
    ctx.moveTo(cx + rw * 1.5, y);
    ctx.lineTo(cx + rw * 1.5 - 6, y + 3);
    ctx.stroke();
  });

  // Internal reversed field (pink, leftward)
  ctx.strokeStyle = 'rgba(255,68,170,0.3)';
  const intY = [-0.05, 0.05];
  intY.forEach(fy => {
    const y = cy + fy * H;
    ctx.beginPath();
    ctx.moveTo(cx - rw * 0.7, y);
    ctx.lineTo(cx + rw * 0.7, y);
    ctx.stroke();
    // Arrows (leftward = reversed)
    ctx.beginPath();
    ctx.moveTo(cx - rw * 0.3, y);
    ctx.lineTo(cx - rw * 0.3 + 6, y - 3);
    ctx.moveTo(cx - rw * 0.3, y);
    ctx.lineTo(cx - rw * 0.3 + 6, y + 3);
    ctx.stroke();
  });

  // Field labels
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#44ff88';
  ctx.textAlign = 'left';
  ctx.fillText('外部磁場 →', cx + rw * 1.2, cy - H * 0.32);
  ctx.fillStyle = '#ff44aa';
  ctx.textAlign = 'center';
  ctx.fillText('← 反転磁場', cx, cy + H * 0.1);
}

function drawNBI(cx, cy, rw) {
  if (phase !== 'nbi' && phase !== 'tite') return;

  // NBI from both ends
  const alpha = 0.5 + 0.3 * Math.sin(time * 3);

  // Left beam
  ctx.strokeStyle = `rgba(255,204,68,${alpha})`;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(cx - rw * 2, cy);
  ctx.lineTo(cx - rw * 0.3, cy);
  ctx.stroke();

  // Right beam
  ctx.beginPath();
  ctx.moveTo(cx + rw * 2, cy);
  ctx.lineTo(cx + rw * 0.3, cy);
  ctx.stroke();

  // Beam labels
  ctx.font = 'bold 12px sans-serif';
  ctx.fillStyle = '#ffcc44';
  ctx.textAlign = 'center';
  ctx.fillText('NBI →', cx - rw * 1.5, cy - 15);
  ctx.fillText('← NBI', cx + rw * 1.5, cy - 15);

  // NBI particles (neutral → ionize inside)
  if (Math.random() < 0.08) {
    const fromLeft = Math.random() > 0.5;
    nbiParticles.push({
      x: fromLeft ? 0.05 : 0.95,
      y: 0.5 + (Math.random() - 0.5) * 0.03,
      vx: fromLeft ? 0.015 : -0.015,
      neutral: true,
      life: 1,
    });
  }
}

function updateParticles() {
  // Temperature evolution
  if (phase === 'nbi') {
    ti = Math.min(2.0, ti + 0.005);
    te = Math.min(0.8, te + 0.001);
  } else if (phase === 'tite') {
    ti = Math.min(2.0, ti + (2.0 - ti) * 0.01);
    te = Math.min(0.5, te + (0.5 - te) * 0.01);
  } else if (phase === 'compare') {
    // Maintain
  } else {
    ti = Math.max(0.1, ti * 0.99);
    te = Math.max(0.1, te * 0.99);
  }

  const speedScale = 1 + ti * 0.5;

  // Ions - confined in FRC ellipse
  ions.forEach(p => {
    p.vx += (Math.random()-0.5) * 0.001 * speedScale;
    p.vy += (Math.random()-0.5) * 0.001 * speedScale;
    // Confine to ellipse
    const dx = p.x - 0.5, dy = (p.y - 0.5) * 2;
    const r = Math.sqrt(dx*dx + dy*dy);
    if (r > 0.22) {
      p.vx -= dx * 0.005;
      p.vy -= dy * 0.005;
    }
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.x += p.vx;
    p.y += p.vy;
    p.speed = speedScale;
  });

  // Electrons
  elecs.forEach(p => {
    p.vx += (Math.random()-0.5) * 0.002;
    p.vy += (Math.random()-0.5) * 0.002;
    const dx = p.x - 0.5, dy = (p.y - 0.5) * 2;
    const r = Math.sqrt(dx*dx + dy*dy);
    if (r > 0.24) {
      p.vx -= dx * 0.008;
      p.vy -= dy * 0.008;
    }
    p.vx *= 0.94;
    p.vy *= 0.94;
    p.x += p.vx;
    p.y += p.vy;

    // Bremsstrahlung emission
    if ((phase === 'tite' || phase === 'nbi') && Math.random() < 0.005 * te) {
      xrays.push({
        x: p.x, y: p.y,
        vx: (Math.random()-0.5) * 0.015,
        vy: (Math.random()-0.5) * 0.015,
        life: 0.7
      });
    }
  });

  // NBI particles
  for (let i = nbiParticles.length - 1; i >= 0; i--) {
    const p = nbiParticles[i];
    p.x += p.vx;
    // Ionize when entering plasma
    const dx = p.x - 0.5, dy = (p.y - 0.5) * 2;
    if (p.neutral && Math.sqrt(dx*dx + dy*dy) < 0.15) {
      p.neutral = false;
      // Add as fast ion
      ions.push({
        x: p.x, y: p.y,
        vx: p.vx * 0.3, vy: (Math.random()-0.5) * 0.005,
        speed: 3
      });
      nbiParticles.splice(i, 1);
      if (ions.length > 70) ions.shift();
      continue;
    }
    p.life -= 0.01;
    if (p.life <= 0 || p.x < 0 || p.x > 1) nbiParticles.splice(i, 1);
  }

  // X-rays
  for (let i = xrays.length - 1; i >= 0; i--) {
    const p = xrays[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.015;
    if (p.life <= 0) xrays.splice(i, 1);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#08081a';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const rw = W * 0.25, rh = H * 0.2;

  // FRC structure
  drawFRC(cx, cy, rw, rh);

  // NBI beams
  drawNBI(cx, cy, rw);

  // Draw NBI particles (neutral = yellow square)
  nbiParticles.forEach(p => {
    const px = p.x * W, py = p.y * H;
    ctx.fillStyle = `rgba(255,204,68,${p.life})`;
    ctx.fillRect(px - 3, py - 3, 6, 6);
  });

  // Draw X-rays
  xrays.forEach(p => {
    const px = p.x * W, py = p.y * H;
    const angle = Math.atan2(p.vy, p.vx);
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(angle);
    ctx.beginPath();
    for (let i = 0; i < 12; i++) {
      const wx = i - 6;
      const wy = Math.sin(i * 1.5 + time * 20) * 2;
      i === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
    }
    ctx.strokeStyle = `rgba(255,238,68,${p.life})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  });

  // Draw electrons (behind ions)
  elecs.forEach(p => {
    const px = p.x * W, py = p.y * H;
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(68,136,255,0.7)';
    ctx.fill();
  });

  // Draw ions
  ions.forEach(p => {
    const px = p.x * W, py = p.y * H;
    const r = 3 + p.speed * 0.8;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    const heat = Math.min(1, p.speed / 3);
    ctx.fillStyle = `rgba(255,${Math.floor(100 - heat * 60)},${Math.floor(68 - heat * 30)},0.85)`;
    ctx.fill();
  });

  // Compare mode overlay
  if (phase === 'compare') {
    ctx.strokeStyle = '#333';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#88ccff';
    ctx.fillText('TAE（定常）', W/4, 30);
    ctx.fillText('4サイクル案（パルス）', W*3/4, 30);

    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('FRC を維持し続ける', W/4, 52);
    ctx.fillText('τ_eq との永遠の戦い', W/4, 68);
    ctx.fillText('ns で燃やして逃げる', W*3/4, 52);
    ctx.fillText('τ_burn < τ_eq なら勝ち', W*3/4, 68);

    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#44ff88';
    ctx.fillText('Ti/Te = 4（実験実証）', W/4, H - 40);
    ctx.fillStyle = '#ffaa00';
    ctx.fillText('Ti/Te = ?（思考実験）', W*3/4, H - 40);
  }

  // Phase title on canvas
  if (phase !== 'compare') {
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#555';
    ctx.textAlign = 'right';
    ctx.fillText('TAE C-2W "Norman"', W - 15, H - 10);
  }

  // Update meters
  const maxT = 3;
  document.getElementById('meterTi').style.width = (ti/maxT*100) + '%';
  document.getElementById('valTi').textContent = ti.toFixed(1) + ' keV';
  document.getElementById('meterTe').style.width = (te/maxT*100) + '%';
  document.getElementById('valTe').textContent = te.toFixed(1) + ' keV';
  const ratio = te > 0.01 ? ti/te : 1;
  document.getElementById('meterRatio').style.width = Math.min(100, ratio/5*100) + '%';
  document.getElementById('valRatio').textContent = ratio.toFixed(1);
  document.getElementById('meterRatio').style.background = ratio > 2 ? '#44ff88' : '#888';
}

function animate() {
  if (!paused) {
    time += 0.016;
    updateParticles();
  }
  draw();
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
